:"","is_secondary":false,"setup_exe":"dev_hdd0\\game\\SCEEXE000\\USRDIR\\EBOOT.BIN","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"ROM: T6B100-1-NA-HDD0-A81\n\nTest menu will crash when trying to access it via TPUI.  Instead, there is a 3rd party standalone utility that you can run first that sets some things up before you try to access the test menu.  Don't forget to undo the test mode setting and set it back to \"main\" when you're done accessing the test menu.  script is unsigned so might throw a false positive. don't be alarmed, it comes from a trusted source.\n\n- Languages available: English\n- First boot will take 5-6 minutes for RPCS3 to create the cache/shader files, which are stored in the RPCS3\\cache folder.  Once they've been created once, subsequent game boots will be significantly faster."},{"profile_name":"Tekken7","game_name":"Tekken 7","archive_name":"Tekken 7 (1.2)(2015)[Namco ES3X][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Namco ES3X","linked_profile":"","is_secondary":false,"setup_exe":"TekkenGame\\Binaries\\Win64\\TekkenGame-Win64-Shipping.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"Tekken7FR","game_name":"Tekken 7: Fated Retribution","archive_name":"Tekken 7 Fated Retribution (1.06.00)(2016)[Namco ES3X][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Namco ES3X","linked_profile":"","is_secondary":false,"setup_exe":"TekkenGame\\Binaries\\Win64\\TekkenGame-Win64-Shipping.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"Tekken7R2","game_name":"Tekken 7: Fated Retribution - Round 2","archive_name":"Tekken 7 Fated Retribution Round 2 (1.08.00)(2019)[Namco ES3A][TP]","genre":"Fighting","tp_loader":"TeknoParrot","arcade_system":"Namco ES3X","linked_profile":"","is_secondary":false,"setup_exe":"TekkenGame\\Binaries\\Win64\\TekkenGame-Win64-Shipping.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"ttt2","game_name":"Tekken Tag Tournament 2","archive_name":"Tekken Tag Tournament 2 (2011)[Namco System 369][TP]","genre":"Fighting","tp_loader":"RPCS3","arcade_system":"Namco System 369","linked_profile":"","is_secondary":false,"setup_exe":"dev_hdd0\\game\\SCEEXE000\\USRDIR\\EBOOT.BIN","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"ROM: TG2100-1-NA-HDD0-E06\n\nIf your RPCS3 dump has an EBOOT.BIN in the root of the SCEEXE000 folder (alongside the ICON0.PNG file, for reference), it needs to be moved.  \n1. Inside the USRDIR, rename EBOOT.BIN to EBOOT.BIN.BAD\n2. from the SCEEXE000 folder, move EBOOT.BIN into the USRDIR folder\n3. game will now work.\n\ncorrect EBOOT.BIN CRC: 3DD05100\nincorrect EBOOT.BIN CRC: 919F19EC\n\nFor whatever reason, the EBOOT.BIN.BAD file has been hex edited to rename the SCEEXE000 folder to SCEEXE001, which doesn't exist in the TP setup. I don't know why this was done, likely something to do with RPCS3, and I don't care to spend any more time wondering why.\n\n- Languages available: English"},{"profile_name":"ttt2u","game_name":"Tekken Tag Tournament 2 Unlimited","archive_name":"Tekken Tag Tournament 2 Unlimited (1.00)(2011)[Namco System 369][TP]","genre":"Fighting","tp_loader":"RPCS3","arcade_system":"Namco System 369","linked_profile":"","is_secondary":false,"setup_exe":"dev_hdd0\\game\\SCEEXE000\\USRDIR\\EBOOT.BIN","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"ROM:  TG2100-2-NA-HDD0-H05 \n\n- First boot will take 5-10 minutes for RPCS3 to create the cache/shader files, which are stored in the RPCS3\\cache folder.  Once they've been created once, subsequent game boots will be significantly faster.\n- On-screen languages available: English, Japanese\n- 357security.bin is 0 bytes. Attempting to place any value in the file will result in the game zeroing it out on next boot.\n\n19-2 SYSTEM ERROR:\n\n- ensure you have a REGION.TXT file in the USRDIR.  Just paste the following into it:\n--------------------------------------------------------\n[AC_TG2]\nsection=region_1\nregion=1\nlang=e\nlivemonitor=0\nlmip=192.168.93.11\nserver=1\n--------------------------------------------------------\n\n- Setting the \"lang=\" variable is for the on-screen character subtitles.  Only \"j\" and \"e\" are valid in this disc dump. You will need to save this setting directly in the REGION.TXT file, as currently the TPUI Devs haven't bothered to enable Service mode saving yet.\n\n- The \"lmip\" variable does not affect anything as the online/networking component is blocked.\n\n- edit the VER01800.TXT file and add \"offline\" at the end of the \"region_x\" line that matches with the REGION.TXT file. This puts the game in offline mode and won't enable the online network stuff. It also stops the online icon and message from showing up on the screen.  For example:\n--------------------------------------------------------\n[region_1]\nself=GAME0180.SELF karmalimit=1000 karmadec=1 romver=H05 muchagidno=1 muchaappver=0205 pairplay=1 keylatency=1 offline\n--------------------------------------------------------\n\nIf you leave the game in online mode, you'll be shown 3 errors during boot, but the game will still start. You'll see the online icon and messages during gameplay, which can be annoying.\n21-3 USB MEMORY ERROR: NOT FOUND\n7-11 CARD R/W DISCONNECT (UNIT 1)\n23-1 NETWORK ERROR 1\n\nI can't seem to see any reason to change the region to anything else other than REGION 2 as it contains the on-screen display language setting that can be set to English or Japanese. The other regions only contain slightly different default service settings and no language options, as indicated below (region 1 being the default).\n\nregion 1:\n\tGame Options:\n\t\tGame Level: Medium\n\t\tFight Count <1P Game>: 2\n\t\tFight Count <VS Game>: 2\n\t\tCharacter change at continue: Yes\t\n\t\tCharacter change at Vs game: No\t\n\t\tEvent Mode: Off\n\t\tPair Play Mode: Off\n\t\tRound Time: 80\n\t\tLife Bar <1P Game>: Normal\n\t\tLife Bar <VS Game>: Normal\n\t\tGuard Damage: Off\n\t\tNeutral Guard: On\n\t\tHit Color: Red\n\t\tAttract Movie: On\n\nregion 2:\n\tGame Options:\n\t\tGame Level: Hard\n\t\tCharacter change at Vs game: Yes\t\n\t\tHit Color: Yellow\n\t\tDisplay Language: English or Japanese (English is default)\n\n**this is the only region that has a Display Language option**\n\nregion 3:\n\tGame Options:\n\t\tGame Level: Hard\n\t\tCharacter change at Vs game: Yes\t\n\t\tHit Color: Yellow\n\t\t\nregion 5:\n\tGame Options:\n\t\tGame Level: Hard\n\t\tCharacter change at Vs game: Yes\t\n\n\nregion 6:\n\tGame Options:\n\t\tGame Level: Hard\n\t\tHit Color: Yellow"},{"profile_name":"TempleRun","game_name":"Temple Run","archive_name":"Temple Run Arcade (1.8.3-R 483)(2014-02-15)[Coastal Linux PC][TP]","genre":"Runner","tp_loader":"ElfLdr2","arcade_system":"COASTAL Linux PC-Based","linked_profile":"","is_secondary":false,"setup_exe":"tr","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- enable \"General - PortraitMode\" to put the game in its proper aspect ratio when playing the game in landscape\n- digital gamepad doesn't seem to work (controls are all wonky), map the game stick\n\nThe game requires to be run at 60Hz only. If you are still experiencing crashes, you can force this at the game level by editing the \"tr.ini\" file and adding the following lines to it:\nRefreshRate=60\nFrequency=60\nVSync=1"},{"profile_name":"Terminator","game_name":"Terminator Salvation","archive_name":"Terminator Salvation (1.25.00)(2010)[Raw Thrills Linux PC][TP]","genre":"Shooter","tp_loader":"ElfLdr2","arcade_system":"RAW Thrills Linux PC Based","linked_profile":"","is_secondary":false,"setup_exe":"game","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"There are three Raw Thrills eras which used different game engines, and the earliest had hard coded path length limits.  These limits MUST not be ignored when setting up these games!  This is a game that will require game folder renaming after you extract it, or else you're just going to run into problems running the game.  See the \"RAW THRILLS path length limits\" section in this document for all the details.\n\n~64-character limit (old engine, strictest):\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"TERM\" (or s g the game.  See the \"RAW THRILLS path length limits\" section in this document for all the details.\n\n~64-character limit (old engine, strictest):\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"FNF\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\nDo not use \"General - HDPatch\".  It uses your desktop resolution, but the alignment of the in-game graphics won't line up properly.\n\nThe native resolution of the game is 640x480, and is what the game exe provided is set for."},{"profile_name":"FNFDrift","game_name":"The Fast and the Furious Drift","archive_name":"The Fast and the Furious - Drift (3.03)(2013-09-10)[Raw Thrills PC][TP]","genre":"Racing","tp_loader":"OpenParrot","arcade_system":"Raw Thrills PC Based","linked_profile":"","is_secondary":false,"setup_exe":"sdaemon.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"If you want to play this game in a higher resolution, there are CAVEATS!\n- the game's internal menus and selection screens are all static 640x480 overlays, and cannot be upscaled.  only the rendered graphics can be upscaled. \n- therefore, if you set the gameplay to be a higher resolution by replacing the main exe with one that has been hacked to run the game at a higher resolution, the menus will be smaller and off-center, but the actual in-game gameplay will fill your screen and be at the set resolution.\n- it is what it is.. take it or leave it.\n\nMy distro is patched for 1280x720.  There are other resolution patches available, there's a whole pack of them in fact.  all that is required is to replace the \"sdaemon.exe\" with the patched version you want to use  for cards.","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Chihiro version via CxbxR emulator\n\n- Game now boots and is working well enough to at least play around with.  \n- game still has stuttering issues in the more complex driving scenes with lots of objects on the screen.  Things like tunnels, the game almost runs full speed.  This is getting better.\n- Card read/writing is fully functional with YACardEmu properly setup with card images.\n\nPre-setup FIRST TIME BOOT:\n\n1. Start YaCardEmu (see below for instructions on how to set this up). Delete or relocate any existing card.bin or card.bin.png files in the root of the game folder.\n\n2. Click Play in TPUI, then press the TEST button when you see the Chihiro intro screen or during the black screen bootup\n\n3. In the test menu, go to GAME OPTION\n\n4. Set STEERING POWER to OFF and exit this menu\n\n5. Select I/O, and then select I/F SETTINGS and calibrate your gamepad joystick. Exit the game menu when you're done.\n\n6. Back on the SYSTEM MENU, press EXIT\n\nNow, you'll have no more WHEEL ERROR issues and NO more STEERING wheel pulling to the right.\n\nNOTE: if you get a CARD WRITER ERROR or NETWORK FAILURE error, just reboot the game.  These are random. \n\nCreate a new WMMT1 Card\n\n1. Insert 2 coins to start a new game\n2. when prompted if you have a card, answer NO\n3. when asked to buy one, insert 2 more coins\n4. game will now let you set up your username for the card, so do all that\n5. Play one of the events.  That's 3-4 minutes you'll never get back.\n6. When the event ends, you'll be asked if you want to continue, answer NO.\n7. In the game folder where the YaCardEmu is, a card.bin and card.bin.png are created.\n8. Treat it like gold, because if you delete the file, you lose all your progress.  Make copies.\n\nHow to Load a WMMT1 Card\n\n1. Start YaCardEmu\n2. If you have more than ONE card, open a browser and browse to your local IP address and port 8080.  eg. http:\\\\192.168.1.25:8080  (not https)\n3. Start TPUI and load the game using the workaround method.\n4. Insert coins and start game\n5. When prompted if you have a card, press the INSERT CARD BUTTON on your controller.  You may have to wait a few moments for the game to load the file, then it will carry on with your stored player.\n7. play the game.\n\nHow to Setup YaCardEmu\n1. download the newest GUI from https://github.com/jcstahl1/YACardEmu-GUI\n2. read the instructions, set it up.\n\nALWAYS FINISH AN EVENT AND EXIT THE GAME BY ANSWERING \"NO\" TO CONTINUING. The game must always EJECT the card for it to successfully update your card.  If you exit out of the game prematurely, that game's progress is lost. \n\n**If you really mess things up and need to get rid of the game's stored settings:**\n\n1. Browse to your TeknoParrot install folder and go into the \\cxbxr\\TeknoParrot subfolder.\n\n2. Inside the \"Games\" subfolder, \n- delete the \"9079db3678dfc34b\" folder\n\n3. inside the \"ShaderCache\" folder, \n- delete the \"00000000-V307\" folder\n\n4. Inside the \"SymbolCache\" folder,\n- delete \"-712f117b89129fa8.ini\"\n\nScroll back up and start the workaround over again."},{"profile_name":"WMMT1J","game_name":"Wangan Midnight Maximum Tune (Japan)","archive_name":"Wangan Midnight Maximum Tune (3.07)(Rev B)(2004-06-10)(JPN)[Sega Chihiro][TP]","genre":"Racing","tp_loader":"cxbxr","arcade_system":"Sega Chihiro","linked_profile":"","is_secondary":false,"setup_exe":"V307.xbe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"Turn off Steering from Test\nUse YACardEmu for cards.","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- see notes for WMMT1"},{"profile_name":"WMMT2","game_name":"Wangan Midnight Maximum Tune 2 (Export)","archive_name":"Wangan Midnight Maximum Tune 2 (3.22)(2005-0 <script>
const GAMES   = JSON.parse(document.getElementById('game-data').textContent);
const SITE    = {"title": "Eggman's TeknoParrot Collection", "subtitle": "Game Notes & Compatibility Reference", "github_url": "https://github.com/Eggmansworld/TeknoParrot"};
const UPDATED = "2026-06-23";
const expanded = new Set();

// --- Status helpers ---
const STATUS_CLS = {
  'Working':  'b-working',  'Partial': 'b-partial',
  'Broken':   'b-broken',   'Untested': 'b-untested'
};
function statusBadge(s) {
  const cls = STATUS_CLS[s] || 'b-untested';
  return `<span class="badge ${cls}">${esc(s)}</span>`;
}

// --- GPU helpers ---
function gpuDot(label, status) {
  if (!status) return `<span class="gpu-dot gpu-na" title="${label}: No data">${label[0]}</span>`;
  const s = status.toUpperCase();
  const cls = s === 'OK' ? 'gpu-ok' : s === 'HAS_ISSUES' ? 'gpu-issue' : 'gpu-no';
  const tip = s === 'OK' ? 'OK' : s === 'HAS_ISSUES' ? 'Has Issues' : 'Not Supported';
  return `<span class="gpu-dot ${cls}" title="${label}: ${tip}">${label[0]}</span>`;
}
function gpuRow(g) {
  if (!g.nvidia_status && !g.amd_status && !g.intel_status) return '—';
  return `<div class="gpu-row">
    ${gpuDot('NVIDIA', g.nvidia_status)}
    ${gpuDot('AMD',    g.amd_status)}
    ${gpuDot('Intel',  g.intel_status)}
  </div>`;
}

// --- Escape ---
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Detail panel ---
function buildDetail(g, idx) {
  let parts = [];

  // Notes
  if (g.notes && g.notes.trim()) {
    parts.push(`<div class="detail-section detail-notes">${esc(g.notes.trim())}</div>`);
  }

  // Hardware compatibility
  const hasHW = g.nvidia_status || g.amd_status || g.intel_status ||
                g.general_issues;
  if (hasHW) {
    let hwRows = '';
    for (const [label, st, iss] of [
      ['NVIDIA', g.nvidia_status, g.nvidia_issues],
      ['AMD',    g.amd_status,    g.amd_issues],
      ['Intel',  g.intel_status,  g.intel_issues],
    ]) {
      if (!st) continue;
      const s  = st.toUpperCase();
      const sc = s === 'OK' ? 'gpu-ok' : s === 'HAS_ISSUES' ? 'gpu-issue' : 'gpu-no';
      const sl = s === 'OK' ? 'OK' : s === 'HAS_ISSUES' ? 'HAS ISSUES' : 'NO';
      hwRows += `<tr><td class="hw-gpu">${label}</td>
        <td class="hw-stat"><span style="color:var(--${sc.replace('gpu-','gpu-')})">${sl}</span></td>
        <td class="hw-iss">${esc(iss||'')}</td></tr>`;
    }
    if (g.general_issues) {
      hwRows += `<tr><td class="hw-gpu">General</td><td colspan="2" class="hw-iss">${esc(g.general_issues)}</td></tr>`;
    }
    parts.push(`<div class="detail-section">
      <h4>Hardware Compatibility</h4>
      <table class="hw-table"><tbody>${hwRows}</tbody></table>
    </div>`);
  }

  // Setup EXEs
  const hasExe = g.setup_exe || g.setup_exe2 || g.test_exe;
  if (hasExe) {
    let exeLines = '';
    if (g.setup_exe)  exeLines += `<div class="detail-exe"><span>EXE 1: </span>${esc(g.setup_exe)}</div>`;
    if (g.setup_exe2) exeLines += `<div class="detail-exe"><span>EXE 2: </span>${esc(g.setup_exe2)}</div>`;
    if (g.test_exe)   exeLines += `<div class="detail-exe"><span>Test Menu: </span>${esc(g.test_exe)}</div>`;
    parts.push(`<div class="detail-section"><h4>Setup Executables</h4>${exeLines}</div>`);
  }

  // Supplementary
  if (g.supp_count > 0) {
    const list = g.supp_archives.split(';').map(a => esc(a.trim())).filter(Boolean);
    parts.push(`<div class="detail-section">
      <h4>Supplementary Archives (${g.supp_count})</h4>
      <div class="supp-list">${list.join(' &bull; ')}</div>
    </div>`);
  }

  // Tags
  if (g.tags && g.tags.trim()) {
    const pills = g.tags.split(';').map(t => t.trim()).filter(Boolean)
      .map(t => `<span class="tag-pill">${esc(t)}</span>`).join('');
    parts.push(`<div class="detail-section"><h4>Tags</h4>${pills}</div>`);
  }

  // Linked profile
  if (g.linked_profile) {
    parts.push(`<div class="detail-section">
      <h4>Linked Profile</h4>
      <span style="font-family:monospace;font-size:.85rem">${esc(g.linked_profile)}</span>
      ${g.is_secondary ? ' <em style="color:var(--txt-dim);font-size:.78rem">(secondary)</em>' : ''}
    </div>`);
  }

  // Last updated + arcade info
  let meta = '';
  if (g.genre)        meta += `<span>Genre: <strong>${esc(g.genre)}</strong></span>  `;
  if (g.last_updated) meta += `<span>Last updated: ${esc(g.last_updated)}</span>`;
  if (meta) parts.push(`<div class="updated-line">${meta}</div>`);

  if (parts.length === 0) {
    parts.push('<div style="color:var(--txt-dim);font-size:.85rem;font-style:italic">No additional details recorded yet.</div>');
  }

  return `<div class="detail-inner">${parts.join('')}</div>`;
}

// --- Row builder ---
function buildRow(g, idx) {
  const isExp = expanded.has(idx);
  const nameSub = [
    g.archive_name ? `<span class="archive">${esc(g.archive_name)}</span>` : '',
    g.profile_name && g.profile_name !== g.game_name ? esc(g.profile_name) : '',
  ].filter(Boolean).join(' &nbsp;');

  const secondaryTag = g.is_secondary ? '<span class="tag-secondary">EL2</span>' : '';

  const gameRow = `<tr class="game-row${isExp?' expanded':''}" data-idx="${idx}" onclick="toggle(${idx})">
    <td><span class="arrow">&#9654;</span></td>
    <td>
      <div class="gname">${esc(g.game_name)}${secondaryTag}</div>
      ${nameSub ? `<div class="gsub">${nameSub}</div>` : ''}
    </td>
    <td class="col-system" style="font-size:.85rem;color:var(--txt-dim)">${esc(g.arcade_system||'—')}</td>
    <td class="col-loader" style="font-size:.82rem;color:var(--txt-dim)">${esc(g.tp_loader||'—')}</td>
    <td class="col-status">${statusBadge(g.status)}</td>
    <td class="col-gpu">${gpuRow(g)}</td>
  </tr>`;

  const detailRow = isExp
    ? `<tr class="detail-row" data-detail="${idx}"><td colspan="6">${buildDetail(g, idx)}</td></tr>`
    : `<tr class="detail-row" data-detail="${idx}" style="display:none"><td colspan="6"></td></tr>`;

  return gameRow + detailRow;
}

// --- Toggle expand ---
function toggle(idx) {
  if (expanded.has(idx)) {
    expanded.delete(idx);
  } else {
    expanded.add(idx);
  }
  // Update just this pair
  const tbody = document.getElementById('tbody');
  const rows  = tbody.querySelectorAll(`[data-idx="${idx}"], [data-detail="${idx}"]`);
  const g     = currentFiltered[idx];
  if (!g) return;
  const isExp = expanded.has(idx);
  if (rows[0]) rows[0].className = 'game-row' + (isExp ? ' expanded' : '');
  if (rows[1]) {
    if (isExp) {
      rows[1].innerHTML = `<td colspan="6">${buildDetail(g, idx)}</td>`;
      rows[1].style.display = '';
    } else {
      rows[1].style.display = 'none';
    }
  }
}

// --- Filtering ---
let currentFiltered = [];

function getFilters() {
  return {
    search: document.getElementById('search').value.trim().toLowerCase(),
    status: document.getElementById('f-status').value,
    loader: document.getElementById('f-loader').value,
    gpu:    document.getElementById('f-gpu').value,
  };
}

function matchGpu(g, gpuFilter) {
  if (!gpuFilter) return true;
  const nv = (g.nvidia_status||'').toUpperCase();
  const am = (g.amd_status||'').toUpperCase();
  const in_ = (g.intel_status||'').toUpperCase();
  if (gpuFilter === 'nvidia-ok')   return nv === 'OK';
  if (gpuFilter === 'amd-ok')      return am === 'OK';
  if (gpuFilter === 'intel-ok')    return in_ === 'OK';
  if (gpuFilter === 'has-issues')  return nv === 'HAS_ISSUES' || am === 'HAS_ISSUES' || in_ === 'HAS_ISSUES';
  if (gpuFilter === 'has-data')    return !!(g.nvidia_status || g.amd_status || g.intel_status);
  return true;
}

function applyFilters() {
  const f = getFilters();
  expanded.clear();

  currentFiltered = GAMES.filter(g => {
    if (f.status && g.status !== f.status) return false;
    if (f.loader && g.tp_loader !== f.loader) return false;
    if (!matchGpu(g, f.gpu)) return false;
    if (f.search) {
      const hay = [g.game_name, g.profile_name, g.archive_name,
                   g.arcade_system, g.notes, g.tags, g.genre]
                  .join(' ').toLowerCase();
      if (!hay.includes(f.search)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = currentFiltered.length === 0
    ? `<tr><td colspan="6" class="no-results">No games match the current filters.</td></tr>`
    : currentFiltered.map((g, i) => buildRow(g, i)).join('');

  document.getElementById('result-count').textContent =
    `${currentFiltered.length} of ${GAMES.length} games`;
}

// --- Stats bar ---
function buildStats() {
  const counts = { Working: 0, Partial: 0, Broken: 0, Untested: 0 };
  GAMES.forEach(g => { if (counts[g.status] !== undefined) counts[g.status]++; });

  const pills = [
    { cls:'',      val: GAMES.length,      lbl: 'Total' },
    { cls:'work',  val: counts.Working,    lbl: 'Working' },
    { cls:'part',  val: counts.Partial,    lbl: 'Partial' },
    { cls:'broke', val: counts.Broken,     lbl: 'Broken' },
    { cls:'untest',val: counts.Untested,   lbl: 'Untested' },
  ];
  document.getElementById('stats').innerHTML = pills
    .map(p => `<div class="stat-pill ${p.cls}">
      <span class="val">${p.val}</span>
      <span class="lbl">${p.lbl}</span>
    </div>`).join('');
}

// --- Populate dynamic filter dropdowns ---
function buildFilters() {
  const statuses = ['Working','Partial','Broken','Untested'];
  const sel = document.getElementById('f-status');
  statuses.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = s; sel.appendChild(o);
  });

  const loaders = [...new Set(GAMES.map(g => g.tp_loader).filter(Boolean))].sort();
  const lsel = document.getElementById('f-loader');
  loaders.forEach(l => {
    const o = document.createElement('option');
    o.value = l; o.textContent = l; lsel.appendChild(o);
  });
}

// --- Header links ---
function buildHeader() {
  const links = document.getElementById('hdr-links');
  if (SITE.github_url) {
    links.innerHTML =
      `<a href="${esc(SITE.github_url)}" target="_blank" rel="noopener">&#128257; GitHub Releases</a>`;
  }
}

// --- Footer ---
function buildFooter() {
  const f = document.getElementById('footer');
  let html = `Generated ${UPDATED} &nbsp;&bull;&nbsp; ${GAMES.length} games`;
  if (SITE.github_url) {
    html += ` &nbsp;&bull;&nbsp; <a href="${esc(SITE.github_url)}" target="_blank" rel="noopener">GitHub</a>`;
  }
  f.innerHTML = html;
}

// --- Init ---
document.getElementById('search').addEventListener('input',  applyFilters);
document.getElementById('f-status').addEventListener('change', applyFilters);
document.getElementById('f-loader').addEventListener('change', applyFilters);
document.getElementById('f-gpu').addEventListener('change',   applyFilters);
document.getElementById('clear-btn').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-loader').value = '';
  document.getElementById('f-gpu').value = '';
  applyFilters();
});

buildStats();
buildFilters();
buildHeader();
buildFooter();
applyFilters();
</script>
</body>
</html>
