trol both players with one Mouse/keyboard setup). The crosshairs will begin to separate from each other using this method, but you can (mostly) bring them closer to each other by hitting the crosshairs on the edges of the screen. You'll figure it out.  You can use this method in a lot of other games too. It's not perfect, but it helps to add a bit of firepower.\n\nCoin 1 = 5\nCoin 2 = 4\nP1 Start = 1\nP2 Start = 2\n\nP1 Light Gun = Mouse\nP1 Gun Trigger = Mouse LeftButton\nP1 Special = Z\n\nP2 Light Gun = Windows Mouse Cursor  (not your mouse! the mouse cursor option)\nP2 Gun Trigger = Mouse LeftButton\nP2 Special = X"},{"profile_name":"LGS","game_name":"Let's Go Safari","archive_name":"Let's Go Safari (2012)[Sega RingWide][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"GameTestR_RingWide.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"LethalEnforcers3","game_name":"Lethal Enforcers 3","archive_name":"Lethal Enforcers 3 (2004)[Konami PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"Konami PC Based","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Best played with RawInput\n- Enable crosshairs \n- change \"General - GameMode\" to \"PLAYER 1 ONLY\" if you only want one screen, 1 player\n- change \"General - GameMode\" to \"2 PLAYERS\" if you  want dual screen, 2 player"},{"profile_name":"LostLand","game_name":"Lost Land Adventure","ar  PORTRAIT.  Then, setup the game in TPUI game settings to:\n\nGeneral - Custom Resolution (Stretches) - DISABLED\nGeneral - Resolution Width:  1080\nGeneral - Resolution Width:  1920\n\nStart the game and enjoy the game in its native orientation.  \n\nIf you really must play it in landscape mode, use the Landscape version that uses ReShade/ArcCabView to rotate and re-scale the screen to fit on your landscape monitor. There is a bit of scaling artifacting so things might look a tiny bit jaggy and you got the black bars on the left and right of the monitor due to the scaling, but its not game breaking.  It's definitely playable if you don't have the option to rotate your monitor. Use the following game settings:\n\nGeneral - Custom Resolution (Stretches) - ENABLED\nGeneral - Resolution Width:  1920\nGeneral - Resolution Width:  1080\n\nGame works fine otherwise."},{"profile_name":"SegaOlympic2020","game_name":"Mario and Sonic at the Tokyo 2020 Olympic Games","archive_name":"Mario & Sonic at Tokyo 2020 Olympic Games (3.00.01)(2019-12-05)(JPN)[Sega ALLS][TP]","genre":"Sports","tp_loader":"TeknoParrot","arcade_system":"SEGA ALLS","linked_profile":"","is_secondary":false,"setup_exe":"package\\app.exe","setup_exe2":"package\\amdaemon.exe","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"PORTRAIT MODE is this game's native format.  If you want the game to look its best, use a monitor in Portrait mode.\n\nThis game has no need for ReShade or 3rd party parlor tricks. TP Devs decided to include their own rotation and scaling components, which turned out great (landscape mode is crisp and sharp, way better than the reshade 2016 version).\n\nSetup a monitor in portrait mode and change its orientation in your graphics card control panel to PORTRAIT.  Then, setup the game in TPUI game settings to:\n\tGeneral - Fullscreen Display Rotation:\tCLOCKWISE or COUNTER CLOCKWISE\n\tGraphics - Enable Bezel:\t\t\t\tDISABLED\n\tGeneral - Use Custom Resolution:\t\tENABLED\n\tResolution Width:\t\t\t\t\t\t1080\n\tResolution Height:\t\t\t\t\t\t1920\n\nIf you choose to play it on a landscape monitor, you'll want to use the included bezel and the following game settings:\n\tGeneral - Windowed: \t\t\t\t\tDISABLED\n\tGeneral - Fullscreen Display Rotation:\tDISABLED\n\tGraphics - Enable Bezel:\t\t\t\tENABLED\n\tGeneral - Use Custom Resolution:\t\tENABLED\n\tResolution Width:\t\t\t\t\t\t1920\n\tResolution Height:\t\t\t\t\t\t1080\n\nIf your bezel is not working, double-check the resolution width and height are set properly."},{"profile_name":"MarioKartGP","game_name":"Mario Kart Arcade GP","archive_name":"Mario Kart Arcade GP (MKA3 Ver A)(2005-10-11)(JPN)[Sega Triforce][TP]","genre":"Racing","tp_loader":"Dolphin","arcade_system":"Sega Triforce","linked_profile":"","is_secondary":false,"setup_exe":"Mario Kart Arcade GP (MKA3A1) (Oct 11 2005 151605)(E).iso","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"MarioKartGP2","game_name":"Mario Kart Arcade GP 2","archive_name":"Mario Kart Arcade GP 2 (MK21 Ver A)(2007-08-20)(JPN)[Sega Triforce][TP]","genre":"Racing","tp_loader":"Dolphin","arcade_system":"Sega Triforce","linked_profile":"","is_secondary":false,"setup_exe":"Mario Kart Arcade GP 2 (MK2100-4-NA-MPRO-B00) (20-08-2007 094721) (E).iso","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"MKDXUSA","game_name":"Mario Kart DX USA","archive_name":"Mario Kart Arcade GP DX (1.05.21-OF)(2016-11-08)(USA)[Namco ES3A][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"Namco ES3A","linked_profile":"","is_secondary":false,"setup_exe":"MK_AGP3_FINAL.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"This supports the 1.05-OF and 1.06-OF English versions of Mario Kart.  \n\nIf your \"MK_AGP3_FINAL.exe\" requires a 4GB patch, TPUI will apply on game startup if your exe is not patched.  It will backup the original file with a \".back\" extension.\n\n4GB patch is already applied on the exe.  You can't play the game without it."},{"profile_name":"MKDXUSA106","game_name":"Mario Kart DX USA (1.06/OF)","archive_name":"Mario Kart Arcade GP DX (1.06.35-OF)(2022-08-01)(USA)[Namco ES3A][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"Namco ES3A","linked_profile":"","is_secondary":false,"setup_exe":"MK_AGP3_FINAL.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"This supports the 1.05-OF and 1.06-OF English versions of Mario Kart.\n\n4GB patch is already applied on the exe.  You can't play the game without it.\n\nGame does NOT have save capabilities.\n\nIf your \"MK_AGP3_FINAL.exe\" requires a 4GB patch, TPUI will apply on game startup if your exe is not patched.  It will backup the original file with a \".back\" extension.\n\nGame REQUIRES a specific Direct3D dll to be in the game's root folder (no longer needed to be placed in the Windows system folder). The game folder contains the 64-bit version of \"D3D11Ref.dll\" for use on 64-bit operating systems. If you have a 32-bit OS, you'll need to get the correct 32-bit version of \"D3D11Ref.dll\" from the TP Discord and use it instead.\n\nTo set a custom resolution and expand the game screen to match:\n\t- in game settings, enable \"General - CustomResolution\"\n\t- in \"General - ResolutionWidth\" and \"General - ResolutionHeight\", enter your screen dimension (ie. 1920, 1080)\n\n\tOtherwise, the game will default to 720p resolution (1360x768). If you run the game without a CustomResolution set on a monitor with a higher resolution than 720p, the game will shrink the game screen to 720p and you will have a big ugly black border around it.\n\nYou must create and use a Mario Kart Arcade GP DX Profile ID. Get one from the teknoparrot.com site, login to your account, and select \"Online Profiles\" from the top menu. Your unique MKGP ProfileID will be listed there. DO NOT SHARE IT WITH ANYONE!  Copy the number into the game settings under \"Network - PlayerId\".  \n\n\"Network - Gateway\", set this to however your local network is configured. In Windows, use the command prompt of \"ipconfig /all\" to find out what your main IP address' gateway IP is.  If you're on a typical home router, setting it to xxx.xxx.xxx.1 should suffice. If you can't figure this out, go chat with an AI bot and figure it out.\n\nThe following folders and their contents can be safely deleted, if you want to completely reset the game and wipe out any changes you made to the service menu. The game will recreate them the next time the game is run.\nFBookkeeping\nFDongleData\nFsystem\nFTestMode\nGBookkeeping\nGDongleData\nGTestMode\n\nIn 1.05-OF version:\nin the root folder, this file is created after the first successful race:\nGboot_limit_1757253xxx.bin\nand anything similar to these with the same timestamps.\n\nIn 1.06-OF version:\nin the root folder, the following files are generated with gameplay and can be safely deleted:\nany file that starts with \"Gcnt_\""},{"profile_name":"MKDX","game_name":"Mario Kart: Arcade GP DX","archive_name":"Mario Kart Arcade GP DX (1.10.22)(2017-06-06)(JPN)[Namco ES3][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"Namco ES3A","linked_profile":"","is_secondary":false,"setup_exe":"MK_AGP3_FINAL.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Mario Kart Arcade GP DX (1.10.22)(T-En Mod 0.6)(2017-06-06)(JPN)[Namco ES3][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"supports the v1.10 Japanese version, or the v1.10 English Mod\n4GB patch is already applied on the exe.  You can't play the game without it.\n\nYou can setup a Banapass card to save your progression.  It has a long story mode that will have you playing for hours. A big thank you to the English mod team for bringing this game to the English players, I completely understand why you did.\n\nThe following folders and their contents can be safely deleted, if you want to completely reset the game and wipe out any changes you made to the service menu. The game will recreate them the next time the game is run.\nFBookkeeping\nFDongleData\nFincome\nFplaydata\nFsystem\nFTestMode\nGBookkeeping\nGDongleData\nGTestMode\n\nthe following files are auto-generated during/after gameplay and can be safely deleted to restore factory defaults:\nGPlayData_xxxxx.bin\nGIncome_xxxxx.bin\nGlast_auth_xxxxx.bin\nGlast_update_event_version_xxxxxx.bin\nhints.dat\nand anything similar to these with the same timestamps.\n\nIf you happen to accidentally delete these settings:\nServerAddress: 104.244.72.41\nServerPort: 49200\nAmAuthPort: 49199\n\nNOTE:  There are numerous patches available (not included) for v1.10, such as:\n- custom USA/JPN attract audio\n- No music patch\n- shader resolution\n- character voiceover update/fix\n- unlocked profile\n- French mod\nMake a backup of your game folder first before applying any of these mods.\n\nIf you are patching your own v1.10 Japan game folder to English:\nThe English mod \"files\" folder and its included .dds files DO NOT need to be kept in the game folder after patching. The .dds files are only file patches which get used to inject/patch data into existing files in the game's \"Data\" folder, using the patcher. Again, after patching the game to English, you can remove the \"files\" folder, as it is not needed."},{"profile_name":"MKDX118","game_name":"Mario Kart: Arcade GP DX 1.18","archive_name":"Mario Kart Arcade GP DX (1.18.16)(2018-12-18)(JPN)[Namco ES3][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"Namco ES3A","linked_profile":"","is_secondary":false,"setup_exe":"MK_AGP3_FINAL.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Mario Kart Arcade GP DX (1.18.16)(T-En Mod 1.0)(2018-12-18)(JPN)[Namco ES3][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"As you probably figured out, this one supports v1.18.\n4GB patch is already applied on the exe.  You can't play the game without it.\n\nTHIS IS LIKELY THE STORY MODE VERSION YOU WANT TO PLAY.\n\nYou can setup a Banapass card to save your progression.  It has a long story mode that will have you playing for hours. A big thank you to the English mod team for bringing this game to the English players, I completely understand why you did.\n\nIf you happen to accidentally delete these settings:\nServerAddress: 104.244.72.41\nServerPort: 49200\nAmAuthPort: 49199\n\nThe following folders and their contents can be safely deleted, if you want to completely reset the game and wipe out any changes you made to the service menu. The game will recreate them the next time the game is run.\nFBookkeeping\nFDongleData\nFsystem\nFTestMode\nGBookkeeping\nGDongleData\nGTestMode\n\nthe following files are auto-generated during/after gameplay and can be safely deleted to restore factory defaults:\nGcnt_*******.bin\nGevent_*******.bin\nGlast_*******.bin\nGRecordRanking_*******.bin\nhints.dat\nand anything similar to these with the same timestamps."},{"profile_name":"MarsSortie","game_name":"Mars Sortie","archive_name":"Mars Sortie (1.46.9)(2018)[UDC PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"UDC PC Based","linked_profile":"","is_secondary":false,"setup_exe":"Shooter.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- requires BepInEx plugin, get the latest one from the TP Discord's #fixes channel.\n- custom webcam images should be in 480x640 resolution, jpg format, called \"webcam1.jpg\", \"webcam2.jpg\" and so on\n\nGame still does not boot on Windows 11 and 13th Gen Core i7.  I have yet to even get this game to start but there was only ever one public dump available, so I at least know the files are correct.\n\nConfig.ini variables:\nstart shooter\nstart shooter -popupwindow\n\nNon-TP standalone game has embedded controls (not required if game run in TPUI)\n[1] ~~ [6] \t\t\t= Coin P1 - P6\n[A] / Mouse Left \t= Trigger P1\n[S]/ Mouse Right \t= Trigger P2\n[D], [F], [G], [H] \t= Trigger P3-P6\n[SPACE] \t\t\t= TEST menu (full chinese)"},{"profile_name":"MaximumHeat","game_name":"Maximum Heat 3D","archive_name":"Maximum Heat 3D (2011)[Namco ES1][TP]","genre":"Racing","tp_loader":"ElfLdr2","arcade_system":"Namco ES1","linked_profile":"","is_secondary":false,"setup_exe":"a.elf","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_upd for you. it also takes some of your score away.  Still, easy enough to win 1000 tickets every so often.\n- The Test Menu IS NOT WORKING.  It is still encrypted and the shell not yet patched.  Changes will likely need to be made externally, such as with BepinEx.  I haven't seen any patches worthy of including yet, so the game is currently archived as-is. \n- I added the shell data in case it could be useful later on. if you don't want it, strip out everything except the MIB folder, simple as that.\n\nThe game has English, Spanish and Turkish languages (currently unselectable)\n\nThe game files are a mess as the developers were super lazy with making changes, they just left in old assets.  There a bunch of \"Attract\" videos that are all the same content and look like someone was just messing around with remux settings.  At some point the devs decided to convert some of the mp4 to webm and just left all the old files kicking around, wasting space.  Someone who bothered to dig into the unity calls could probably figure out what isn't being used anymore.  Or just do what I did.. leave it all alone and chalk the extra couple of gigs of wasted storagef space as exactly that.\n\nThis game is horrendously easy, a money-to-ticket converter for the kiddies is all this piece of shit game is. Very, very disappointing. One can only hope the test menu has an \"arcade\" feature to unlock."},{"profile_name":"MetalGearArcade","game_name":"Metal Gear Arcade","archive_name":"Metal Gear Arcade (2011-09-29)(JPN)[Konami PC][TP]","genre":"Shooter","tp_loader":"TeknoMacaw","arcade_system":"Konami PC-Based","linked_profile":"","is_secondary":false,"setup_exe":"modules\\launch.dll","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"game boots and plays.\n\nERROR 5-1520-0501 (empt TeknoParrot","arcade_system":"PC Based","linked_profile":"","is_secondary":false,"setup_exe":"glquake_decrypted.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"Works via Teknoparrot Online only for now, do not start it without TPO.","supp_count":1,"supp_archives":"Quake Arcade Tournament Edition (music enabled)(1.30 r3)(1998-08-24)[Midway PC][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"info: https://www.quaddicted.com/quake/quake_arcade_tournament_edition\n\nTP Devs dropped this on our laps with online-only multiplayer TP support ONLY.  Nobody is waiting in the lobby to play against you. This game requires considerable setup just to get it to run. They could have at least gave us single player mode.  I can't test this game in TPUI as I don't have enough licenses, so I tested everything in standalone mode.\n\nRUN STANDALONE:\nHere's some quick bullet points to help you to get the game to a playable state by directly running \"glquake_decrypted.exe\".\n\n- you need to install nGlide drivers in Windows. https://www.zeus-software.com/downloads/nglide \n\n- you do NOT need to put the glide dll's in the game folder. the game will find them in your system folder.\n\n- you need to run the decrypted exe with the option of -nogci (this bypasses the security dongle check)\n\n- setup a quick batch file to run the exe so you don't need to type it in manually:\n\n@echo off\nstart \"Quake ATE\" /WAIT \"glquake_decrypted.exe\" -nogci\nexit\n\n- **NOTE** the only way to play a game in the arcade build is to load a pre-existing saved game. If you try to start a \"new game\", it'll just kick you back to the start of the attract mode.\n\nTHE GAME MUST BE PUT INTO FREE PLAY MODE TO PLAY.  Go into the game OPTIONS and enable the setting.  Then load a pre-existing save game and play.\n\nF9 - Quit game\nF10 - clear credits, takes you back to the main attract screen\n\n- setup your keyboard bindings via the in-game menu. WASD and mouse should be your primary method of playing the game. What the bindings are set to is up to your preference.\n\n- I believe the default option is to invert the mouse for up/down movement. disable it in the options menu so up means up, and down means down.\n\n- DO NOT BOTHER trying to run the game in a higher resolution through command line. glquake is hard coded for 640x480 and it has no textures for higher resolutions, and no flexibility otherwise to adjust to any other resolution other than the one it was meant to run at. You may be able to use 3rd party tools, but it isn't going to make the game look any better than it already is.\n\n- the game attract videos will NOT PLAY PROPERLY. You need to comment out their existence by opening the \"quake.rc\" file in the \"ID1\" folder. \n\t- put // in front of each line that contains an .avi file, for example:\n\n\t//startdemos avis\\lbe.avi\n\tstartdemos demos\\hipdemo2.dem\n\n\t- do not comment out the .dem lines.\n\n- if the videos are left enabled, the avi's try to play in 640x480 windowed mode as an overlay on top of glquake's fullscreen hardware window. it would have workred in the Win95 days which the game was built for, but this type of direct hardware access breaks in modern OS'es. Win95 was very easy to force things like this, but not anymore.\n\n- set the game font size to 1.60 in the options menu so you don't get weird glitching around the letters. The custom font does not scale well.\n\n- the only emu platform that would properly emulate the environment and hardware needed is PCem (and possibly 86Box). I have attempted to run the original hard drive .img in it, but I ran into problems with the glide driver not being properly associated with the Obsidian2 Voodoo2 card.  I'm sure there are some smart people out there who have their own private builds of this game. The couple of hours I battled with it caused me to abandon efforts for now.  The recommended hardware settings are:  Intel 440BX (via the Slot 1 Gigabyte GA-686BX machine), CPU = Intel Pentium II 233MHz or higher, 64MB RAM, S3 Trio64 or S3 ViRGE, with Voodoo2 enabled and memory sizes set as high as they go (4MB iirc), 2 button PS2 mouse, no joystick, no network card (not required for the game).\n\n- Use an AI to dig into the meat and potatoes of this game if you really want to muck around with editing or modding.\n\nI have started to chip away at my own build of this game, fixing some stuff and adding some features back in such as CD music (successfully, it's nice to have NIN in the background!). If it eventually turns into anything, I'll share it."},{"profile_name":"sukuinuf","game_name":"Quiz & Variety Suku Suku Inufuku 2 - More Suku Suku","archive_name":"Quiz & Variety Suku Suku Inufuku 2 - More Suku Suku [Namco System 246][TP]","genre":"Fighting","tp_loader":"pcsx2x6","arcade_system":"Namco System 256","linked_profile":"","is_secondary":false,"setup_exe":"NM00037.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"R-Tuned","game_name":"R-Tuned : Ultimate Street Racing","archive_name":"R-Tuned - Ultimate Street Racing (1.000)(2008-09-26)[Sega Lindbergh Yellow][TP]","genre":"Racing","tp_loader":"Lindbergh","arcade_system":"SEGA Lindbergh Yellow","linked_profile":"R-TunedElf2","is_secondary":false,"setup_exe":"dsr_HD","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"dsr\ndsr_HD\ndsr_HD_FFB - force feedback\ndsr_VGA\ndsr_VGA_FFB - force feedback"},{"profile_name":"R-TunedElf2","game_name":"R-Tuned : Ultimate Street Racing (ElfLoader 2)","archive_name":"R-Tuned - Ultimate Street Racing (1.000)(2008-09-26)[Sega Lindbergh Yellow][TP]","genre":"Racing","tp_loader":"ElfLdr2","arcade_system":"SEGA Lindbergh Yellow","linked_profile":"R-Tuned","is_secondary":true,"setup_exe":"dsr_HD","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"vroom vroom"},{"profile_name":"RabbidsHollywood","game_name":"Rabbids Hollywood","archive_name":"Rabbids Hollywood (2018)[Adrenaline PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"ADRENALINE PC Based","linked_profile":"","is_secondary":false,"setup_exe":"Game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"I had to apply the \"triggers & crosshairs\" fix (Assembly-CSharp.dll), otherwise assigned TPUI controls don't work\n\nUse RabbidsHollywood_Operator.exe to set the game operator settings (this is done with a BepInEx plugin, and the operator settings are modified with the included app)\n- set your desktop resolution (saves entry to registry)\n- also set GUN 1 to ON\n- set any other things you want (probably don't need to)\n- click on SAVE and exit app (will create a small .conf file)\n- run Teknoparrot\n\nThe trigger button in this game is seriously messed up, even with the trigger fix.  The trick with getting your gun into \"autofire\" is to perform a double-click with your left mouse button, but on the 2nd click, HOLD IT DOWN.  90% of the time you will be successful in getting yourself into autofire mode. \n\nThere really isn't any single-shot mode and the real arcade game expects you to hold the trigger down, since to make each single shot requires a double-click.  It's about as good as it gets until the devs fix this."},{"profile_name":"RaccoonRampage","game_name":"Raccoon Rampage","archive_name":"Raccoon Rampage (1.4)(Original version)(2023)[UNIS PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"UNIS PC Based","linked_profile":"","is_secondary":false,"setup_exe":"RSGame\\Binaries\\Win64\\RSGame-Win64-Shipping.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"Please calibrate the lightguns\n in the test menu,\n the first time you start playing.","supp_count":1,"supp_archives":"Raccoon Rampage (1.4)(Sinden ReShade version)(2023)[UNIS PC][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"I chose to include two versions of Raccoon Rampage to allow people to pick depending on what hardware they are using.  Originally the game was released with ReShade baked in to provide Sinden lightgun support.  Knowing that not everyone would want to see the white bars around the screen edges if they're not using a lightgun, I created an \"Original\" version with ReShade removed."},{"profile_name":"RadikalBikers","game_name":"Radikal Bikers (Third-Party Emulator)","archive_name":"Radikal Bikers (1998)[Gaelco PC,Atari License][TP]","genre":"Racing","tp_loader":"OpenParrot","arcade_system":"Gaelco PC Based (Atari License)","linked_profile":"","is_secondary":false,"setup_exe":"radikalb.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"Minor Graphical Issues","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"RaidenIII","game_name":"Raiden III","archive_name":"Raiden III (2.01J)(Portrait)(2005-03-08)(JPN)[Taito Type X][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito Type X","linked_profile":"RaidenIIINesica","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"This is the 2005 Taito Type X version , which is hardcoded in Portrait mode.\n\n- Native orientation: Portrait (TATE)\n- Internal resolution: roughly 768×1024 (varies slightly by build).\n- Graphics API: DirectX 9.0c, fixed-function pipeline, single render target.\n- Cabinet setup: The monitor was physically rotated; the game logic, HUD, and player input all assumed a vertical layout.\n- Executable behavior: It sets up a window or full-screen surface with a tall aspect ratio; nothing in the original binaries supports landscape scaling.\n\nSo, yeah — totally designed as a proper vertical shooter from the ground up."},{"profile_name":"RaidenIIINesica","game_name":"Raiden III for NESiCAxLive","archive_name":"Raiden III (2.01J)(Portrait)(2005-03-08)(JPN)[Taito Type X][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"RaidenIII","is_secondary":true,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Raiden III (1.02)(Landscape)(2013-01-10)(JPN)[Taito NESiCAxLive][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"If controls are not working, RUN TPUI IN ADMIN MODE.  Then exit out and try running TPUI in non-admin mode and see if the problem clears up.\n\nWhen Taito re-released Raiden III on NESiCAxLive, they standardized it for modern NESiCA cabinets — which, by then, all used widescreen 16:9 LCDs mounted horizontally.\n\nTo make it work, Taito didn’t rewrite the game from scratch; they did a wrapper-style adaptation, very similar in spirit to Raiden IV NESiCA\n\nDisplay Mode: \t\tForced 1280×720 landscape output\nInternal Render:\tThe old 768×1024 TATE framebuffer still exists internally; it’s scaled and centered\nBezel Artwork: \t\tAdded left/right side DDS textures (e.g., raiden3_left_hd.dds, raiden3_right_hd.dds)\nRenderer:\t\t\tUses Taito’s NxLRenderer.dll / NxLCountDownRenderer overlay layer\nCountdown & UI:\t\tNESiCA overlay elements composited after the game’s render pass\n\nSo the NESiCA release runs the original vertical gameplay inside a widescreen wrapper."},{"profile_name":"RaidenIV","game_name":"Raiden IV","archive_name":"Raiden IV (1.00J)(Portrait)(2007-04-23)(JPN)[Taito Type X][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito Type X","linked_profile":"RaidenIVNesica","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- This is the 2007 Taito Type X version, which is hardcoded in Portrait mode.\n- native resolution is 720x1280.\n- Needs frame limiting enabled in game setup."},{"profile_name":"RaidenIVNesica","game_name":"Raiden IV for NESiCAxLive","archive_name":"Raiden IV (1.00J)(Portrait)(2007-04-23)(JPN)[Taito Type X][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"RaidenIV","is_secondary":true,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Raiden IV (1.03J)(Landscape,Bezel)(2012-12-27)(JPN)[Taito NESiCAxLive][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"This is the landscape version of Raiden IV for NESiCA.\n\nWHY is there no portrait mode version of Raiden IV for NESiCA?\n--------------------------------------------------------------\n\n- The Original Game Was Portrait (TATE).\n- The original arcade Raiden IV (2007, Taito Type X) was a native 720×1280 portrait game.\n- The core renderer and gameplay area were meant for a vertical screen. In real cabinets, the monitor was physically rotated (TATE mode), like classic Raiden or Mushihimesama setups.\n\nWhen Raiden IV was added to the NESiCA lineup, Taito did not want operators to have to rotate monitors anymore (most NESiCA cabinets are fixed 16:9 LCDs).\n\nSo they:\n- Re-rendered or scaled the game’s portrait gameplay into a pillarboxed landscape output (1280×720).\n- Added side artwork / bezels, provided by those .dds textures:\n\t\traiden4_left_hd.dds\n\t\traiden4_right_hd.dds\n- Used the NxL overlay renderer to composite those textures around the main game viewport.\n\nEssentially, the game still “thinks” it’s drawing in portrait mode internally — NESiCA’s renderer just sandwiches that between two static textures to fill a 16:9 frame.\n\nUndoing this makes no sense, as it would no longer be valid for NESiCA cabinets."},{"profile_name":"RainbowBombergirl","game_name":"Rainbow Bombergirl","archive_name":"Rainbow BomberGirl (2022-12-15)(JPN)[Konami PC][TP]","genre":"Multiplayer","tp_loader":"TeknoParrot","arcade_system":"KONAMI PC Based","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Must use latest BepInEx plugin\n\nMUST USE CONTROLLER!  Setup XINPUT\n\nto use mouse for touchscreen (screen will accept touch input after character select screen)\n- disable \"HideCursor\"\n- remove \"Touch\" controller entries (leave blank)\n- use mouse in-game\n\nGame runs natively in 1920x1080, using other resolutions may impact the layout of the screens, including reversing the order (main screen on left, touchscreen on right)\n\nThe original game ran its main screen in portait mode, and the secondary touchscreen monitor in portait mode. If you run the game in forced single screen mode, both screens will be combined, and results in an empty black space above the portait mode touchscreen.  You can add a bezel into the empty area if you want to via the TPUI game setup."},{"profile_name":"Rambo","game_name":"Rambo","archive_name":"Rambo (1.0)(2008-07-25)(USA)[Sega Lindbergh Red EX][TP]","genre":"Shooter","tp_loader":"Lindbergh","arcade_system":"SEGA Lindbergh Red EX","linked_profile":"RamboElf2","is_secondary":false,"setup_exe":"elf\\ramboD.elf","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"Broken blur","amd_status":"WITH_FIX","amd_issues":"","intel_status":"WITH_FIX","intel_issues":"","general_issues":"Sound emulation is not perfect","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Native resolution is 1360x768\n\nThere are now 2 loaders supported. They both use the same game folder, however, the difference is in the executable they use:\n\n- emulator: Lindbergh\n- exe: ramboD.elf\n\n- emulator: ElfLdr2\n- exe: ramboM.elf\n\nUse ElfLdr2 for best gameplay."},{"profile_name":"RamboElf2","game_name":"Rambo (Elfloader 2)","archive_name":"Rambo (1.0)(2008-07-25)(USA)[Sega Lindbergh Red EX][TP]","genre":"Shooter","tp_loader":"ElfLdr2","arcade_system":"SEGA Lindbergh Red EX","linked_profile":"Rambo","is_secondary":true,"setup_exe":"elf\\ramboD.elf","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"Broken blur","amd_status":"WITH_FIX","amd_issues":"","intel_status":"WITH_FIX", (JPN)[Sega RingEdge][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge","linked_profile":"","is_secondary":false,"setup_exe":"project_f-ringedge-release.exe","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"Some things doesn't render","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- tap the screen to start\n- on the \"Top Mode Select\" screen, load a card by pressing F2\n- takes about 5 seconds, then you'll see the card on the left side of the screen\n- press the Game Play button twice onthe right side of the screen\n- name and tweak the look of your character\n- play game\n- your card is in the \"Teknoparrot\" folder called iccard.bin\n\n***DO NOT CONFIGURE THE CONTROLS FOR DIGITAL DIRECTIONS, ONLY THE X,Y FOR MOVEMENT!"},{"profile_name":"ShiningForceCrossElysion","game_name":"Shining Force: Cross Elysion","archive_name":"Shining Force - Cross Elysion (2.06.00 Ver C)(2012-12-29)(JPN)[Sega RingEdge][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge","linked_profile":"","is_secondary":false,"setup_exe":"project_f-ringedge-release.exe","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"Some things doesn't render","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- native resolution is 1280x720\n\nrequires a shader fix for NVidia and AMD GPU's:\n- In the \"rom\" folder, find the \"shader.farc\" file.\n- you will see 3 other similar files, as such:\n\t\tshader.farc.AMD\n\t\tshader.farc.NVIDIA\n\t\tshader.farc.ORIGINAL\n(If you're a basic Windows user, you may need to \"unhide extensions\" in your file explorer to see the full filenames including extensions.  Go take a computer course while you're at it, i'm not teaching you how to do this here.)\n- Choose the file that applies to your system (either NVidia or AMD graphics), delete the existing shader.farc file and rename the applicable file by removing the \"AMD\" or \"NVIDIA\" extension so that it is renamed back to \"shader.farc\".\n- Congrats, you patched your game.\n\n\nThe card saving should be fixed as of 10 Jan 2026, so you may not need to follow the IC Card save docs below.\n\n\nHOW TO USE THE IC CARD TO SAVE YOUR PROGRESS\n---by Eggman--------------------------------\n\nYou will need to use IC Card files that are stored on your local hard drive.\n\n1. in the root of your game folder, open the \"Cross Elysion IC Card\" folder and then ask yourself:\n\n\t(A) \"I want to walk through the entire process of the card loading and updating\":\n\t\t\t- copy the two files inside the \"original card\" folder and put them in the root of your C:\\ drive\n\t\tor \n\t(B) \"I am impatient, and I want to skip having to update the original card to the newer format the game wants\"\n\t\t\t- copy the two files inside the \"updated card\" folder and put them in the root of your C:\\ drive\n\n\tTHESE ARE CLEAN IC Cards.\n\nI'm going to make this extremely easy for you to follow along.  For each Step explanation below, there is an accompanying screenshot to look at - just like a picture book!\n\nREMEMBER, these selections are all on a 60-second timer, so it might take you a few attempts to get it right if you can't read Japanese.\n\n\nStart the game and once you get to the \"SEGA\" attract screen, press the start or F2 button.\n\nStep 1:\n- click on the IC Customize button so it turns red, then click on the green circle\n\nStep 2:\n- Press the F2 key on your keyboard to read the IC Card file\n\nStep 3:\n- The card is read in, and basic stats are shown in the bottom left corner of the screen.  (If this is not the file you want, in the bottom right corner, press the \"IC disconnect\" button to unload the card)\n\nStep 4:\n- Click the top-left green box to turn it red, then click on the green button in the bottom-right corner of the screen\n\nStep 5:\n- Press the YES button.  This is just a wall of text telling you it is going to update your card.\n\nStep 6:\n- update in progress screen, just wait\n\nStep 7:\n- card update complete. press the purple button in the bottom right to finish\n\nStep 8:\n- you're back on the SEGA screen, so press the start or F2 button\n\nStep 9:\n- now back on the main menu, press the F2 button on your keyboard\n\nStep 10:\n- look, your unnamed character is here!  ain't he grand.\n\nStep 11:\n- click on the \"Game Play\" box and press the Green button to continue.\n\nGet the Google Translate app running on your phone, because my help for you is done here and you're on your own!\n\n\n**NOTE**\n- Currently you cannot change or name your character.  You shall remain nameless.\n\n**WARNING** \n- both Cross Elysion and Cross Raid games use the IDENTICAL filenames in the SAME location for their IC Cards.\n- if you want to switch between games, you MUST keep them separated so they don't get corrupted!  \n- I would recommend creating two folders on your C:\\ drive, let's call them \"Cross Elysion IC Card\" and \"Cross Raid IC Card\", and placing each game's relative iccard.bin and iccard.txt inside them for safekeeping\n- When you want to play one of the Shining Force games, copy or move that game's IC files into the root of the C:\\ drive before starting the game\n- when you're done playing, put the two IC files back in their folder for safekeeping\n- if you switch between the games and forget about your IC card files and the wrong ones are in your C:\\ drive, you're screwed and there's no fixing them.  SO BE CAREFUL.\n\nYou can be real smart about this and only play one game Shining Force game at a time so you don't have a chance to fuck your progress up.\n\n-----------------------------------\n\nSOMEHOW, TP MANAGED TO MESS UP THE DIRECTION KEYS!  How they couldn't even bother to fix this amazes me.\n\nWhen binding your keys, this is what you need to program them in as so you end up going in the proper direction.\n\nUP (Digital): \t\tLEFT\nDOWN (Digital): \tRIGHT\nLEFT (Digital): \tDOWN\nRIGHT (Digital): \tUP \n\n- Touch screen works, just use mouse or if you have touch screen, use that.\n\n- If you use Digital movement, please LEAVE ANALOG UNBINDED!  Personally I never was able to get the analog joystick to work at all, so i just stuck with the digital keys.\n\nother user notes:\nMultiplayer links but no modes are unlocked, feel free to hax!"},{"profile_name":"ShiningForceCrossRaid","game_name":"Shining Force: Cross Raid","archive_name":"Shining Force - Cross Raid (1.05 Ver A)(2011-08-03)(JPN)[Sega RingEdge][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge","linked_profile":"","is_secondary":false,"setup_exe":"project_f-ringedge-release.exe","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"Some things doesn't render","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"HOW TO USE THE IC CARD TO SAVE YOUR PROGRESS\n---by Eggman--------------------------------\n\nYou will need to use IC Card files that are stored on your local hard drive.\n\n1. in the root of your game folder, open the \"Cross Elysion IC Card\" folder and then ask yourself:\n\n\t(A) \"I want to walk through the entire process of the card loading and updating\":\n\t\t\t- copy the two files inside the \"original card\" folder and put them in the root of your C:\\ drive\n\t\tor \n\t(B) \"I am impatient, and I want to skip having to update the original card to the newer format the game wants\"\n\t\t\t- copy the two files inside the \"updated card\" folder and put them in the root of your C:\\ drive\n\n\tTHESE ARE CLEAN IC Cards.  Keep a copy of them safe.\n\nI'm going to make this extremely easy for you to follow along.  For each Step explanation below, there is an accompanying screenshot to look at - just like a picture book!\n\nREMEMBER, these selections are all on a 60-second in-game timer, so it might take you a few attempts to get it right if you can't read Japanese.\n\nStep 0:\n- Start the game and once you get to the \"SEGA\" attract screen, press the start or F2 button.\n\nStep 1:\n- On the Main menu (\"Top Mode\"), press F2 to load your card\n\nStep 2:\n- Card loads, but it wants to update it.\n\nStep 3:\n- Click on IC SET UP box and it turns red, then click green circle to continue\n\nStep 4:\n- Click on light-blue box for card update\n\nStep 5:\n- Press the YES button.  This is just a wall of text telling you it is going to update your card.\n\nStep 6:\n- update in progress screen, just wait\n\nStep 7:\n- card update complete. press the purple button in the bottom right to finish\n\nStep 8:\n- you're back on the SEGA screen, so press the start or F2 button\n\nStep 9:\n- now back on the main menu, press the F2 button on your keyboard to load your freshly updated card\n\nStep 10:\n- look, your unnamed character is here!  what a studmuffin.\n\nStep 11:\n- click on the \"Game Play\" box and press the Green button to continue.\n\nGet the Google Translate app running on your phone, because my help for you is done here and you're on your own!\n\n\n**NOTE**\n- Currently you cannot change or name your character.  You shall remain nameless.\n- I have confirmed that the game will save your progress to the IC Card.  I managed to fumble my way through the first scenario.  \n- If you loaded up on tickets before starting and have some left over, you will need to abandon them if you want to save your game and exit.\n\n**WARNING** \n- both Cross Elysion and Cross Raid games use the IDENTICAL filenames in the SAME location for their IC Cards.\n- if you want to switch between games, you MUST keep them separated so they don't get corrupted!  \n- I would recommend creating two folders on your C:\\ drive, let's call them \"Cross Elysion IC Card\" and \"Cross Raid IC Card\", and placing each game's relative iccard.bin and iccard.txt inside them for safekeeping\n- When you want to play one of the Shining Force games, copy or move that game's IC files into the root of the C:\\ drive before starting the game\n- when you're done playing, put the two IC files back in their folder for safekeeping\n- if you switch between the games and forget about your IC card files and the wrong ones are in your C:\\ drive, you're screwed and there's no fixing them.  SO BE CAREFUL.\n\nYou can be real smart about this and only play one game Shining Force game at a time so you don't have a chance to fuck your IC Card progress up.\n\n-----------------------------------\n\nSOMEHOW, TP MANAGED TO MESS UP THE DIRECTION KEYS!  How they couldn't even bother to fix this amazes me.\n\nWhen binding your keys, this is what you need to program them in as so you end up going in the proper direction.\n\nUP (Digital): \t\tLEFT\nDOWN (Digital): \tRIGHT\nLEFT (Digital): \tDOWN\nRIGHT (Digital): \tUP \n\n- If you use Digital movement, please leave ANALOG unbinded. Personally I never was able to get the analog joystick to work at all, so i just stuck with the digital keys.\n\n- Touch screen works, just use mouse or if you have touch screen, use that.\n\nother user notes:\nMultiplayer links but no modes are unlocked, feel free to hax!"},{"profile_name":"ShiningForceCrossExlesia","game_name":"ShiningForceCrossExlesia","archive_name":"Shining Force - Cross Exlesia (3.xx.xx)(2013)(JPN)[Sega RingEdge][TP]","genre":"","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge","linked_profile":"","is_secondary":false,"setup_exe":"","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"Some things doesn't render","intel_status":"NO","intel_issues":"","general_issues" ":"Working","tags":"","last_updated":"2026-06-23","notes":"- Namco System 246\n\nTo create a working Conquest Card:\n- download SC2Maker from https://israpps.github.io/SC2MAKER/\n- extract the \"cardmaterial.bin\" file from the zip, and rename it to \"Card0.conquestcard\"\n- place the renamed card file inside the memcards folder within your TeknoParrot pcsx2x6 install folder:\n\\TeknoParrot\\pcsx2x6\\TeknoParrot\\memcards\n- ENSURE YOU ARE USING THE \"DVD0D\" DVD-ROM ISO VERSION OF SOUL CALIBUR II, converted to CHD.  The MAME version will not work since that version is a HDD image.\n https://archive.org/download/system2x6/Namco%20System%202X6/NM00007%20Soul%20Calibur%20II/NM00007%20SC21%20DVD0D%20%28DVD-ROM%29.iso.gz\n\nDownload and extract the iso out of the gzip archive.  Run the following command on the file:\nchdman.exe createdvd -i \"NM00007 SC21 DVD0D (DVD-ROM).iso\" -o \"NM00007 SC21 DVD0D (DVD-ROM).chd\"\n\nThe proper CHD will have the following info:\n\nchdman info -i \"NM00007 SC21 DVD0D (DVD-ROM).chd\"\n\nchdman - MAME Compressed Hunks of Data (CHD) manager 0.288 (mame0288)\nInput file:   NM00007 SC21 DVD0D (DVD-ROM).chd\nFile Version: 5\nLogical size: 4,053,794,816 bytes\nHunk Size:    2,048 bytes\nTotal Hunks:  1,979,392\nUnit Size:    2,048 bytes\nTotal Units:  1,979,392\nCompression:  lzma (LZMA), zlib (Deflate), huff (Huffman), flac (FLAC)\nCHD size:     378,736,369 bytes\nRatio:        9.3%\nSHA1:         42634bda98fd99076c33399a19d9206271776182\nData SHA1:    187d94b055324efd999b83a7fc9ebef8d179548f\nMetadata:     Tag='DVD '  Index=0  Length=1 bytes\n\n- start the game in TPUI\n- if it is your first boot, go into TEST MODE and select \"DATA CLEAR\", then \"All clear\".  Select YES to confirm.  go back to the main menu and select SAVE & EXIT.\n- boot the game again.  When you get to the checking memory card screen, it should now say \"SAVING\" along the top of the screen.  The card is being reformatted properly.  It only takes about 5 seconds to format.\n- Play CONQUEST MODE so you can save your progress!"},{"profile_name":"soulclb3","game_name":"Soul Calibur III Arcade Edition","archive_name":"Soul Calibur III Arcade Edition (2005)[Namco System 246][TP]","genre":"Fighting","tp_loader":"pcsx2x6","arcade_system":"Namco System 246","linked_profile":"","is_secondary":false,"setup_exe":"NM00031.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Namco System 246\n- the MAME CHD is a GDDD image and needs to be converted if not yet done so. if not yet done so.\n- game starts"},{"profile_name":"SpaceInvaders","game_name":"Space Invaders for NESiCAxLive","archive_name":"Space Invaders (1.05)(2012-02-09)(JPN)[Taito NESiCAxLive][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Space Invaders (1.05)(2012-02-09)(Reshade+Bezel)(JPN)[Taito NESiCAxLive][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"GAME ONLY WORKS WITH ONE MONITOR TURNED ON. If you have any other extra monitors on your PC turned on, you'll need to turn them off to play the game.  \n\nIf you try to run the game with multiple monitors turned on, you'll end up with a popup window that has a title of \"ƒXƒy[ƒXƒCƒ“ƒx[ƒ_[\" and some mojibake line that starts with \"MTS\", which when deciphered it is saying something to the effect of \"MTS system initialization failed\".  The game is basically saying it can’t talk to its MTS subsystem (Taito’s Multi Terminal System, basically the NESiCAxLive network/auth layer).  The on ed the Phoenix or early Unicorn loader. They’ll choke above 96, but 80–90 is still safest. These usually run on Linux builds with slightly safer path logic (longer structs), but still choke >96.\n\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"FNFSB2\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\nEnable \"General - Framelimiter\"\n\nGame works fine with XInput."},{"profile_name":"SB3","game_name":"Super Bikes 3","archive_name":"Super Bikes 3 (1.91 x64)(2021-10-01)[Raw Thrills][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"Raw Thrills PC Based","linked_profile":"","is_secondary":false,"setup_exe":"fnfmega.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- TPUI only supports the x64 version of this game\n- requires BepInEx and latest plugin to work (get plugin from Discord)\n- requires Unity Fmod x64_v1.10.10\n- some people report the game will only work in 60Hz mode for them if they have their monitor set to a different frequency. Use Riva Tuner or make changes to your GPU settings.\n- some graphic cards have massive stalling/screen glitching. My T1000 won't play the game properly - the game still runs, it's just unplayable. \n\nThere is a standalone x86 version of this game available and works great for me, so if this game is causing you problems with fucked up graphics, use the x86 version.\n\nNative resolution is 1360x768\n\nGame writes to the registry:\nComputer\\HKEY_CURRENT_USER\\Software\\RawThrills\\sb3\n\nand to:\nC:\\Users\\your_username\\AppData\\LocalLow\\RawThrills\\sb3"},{"profile_name":"superdbz","game_name":"Super Dragon Ball Z","archive_name":"Super Dragon Ball Z (2005)[Namco System 256][TP]","genre":"Fighting","tp_loader":"pcsx2x6","arcade_system":"Namco System 256","linked_profile":"","is_secondary":false,"setup_exe":"NM00027.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Namco System 256\n- game starts"},{"profile_name":"Mballblitz","game_name":"Super Monkey Ball: Ticket Blitz","archive_name":"Super Monkey Ball Ticket Blitz (1.00.03)(2010-08-19)(USA)[Sega RingWide][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"prjMonkey_tv_final.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- This game is for trackballs only. \n- You can use a mouse to get the monkey to start moving, but you won't gain any real speed and end up stuck in various places that have any sort of incline.\n- The game chooses one of twelve random levels to start.  You only get to play one level per game.\n\n- This game records revealing digital information when it creates text files used to store a player's game stats.  \n\t1. It queries for the hostname of the computer the game is running on\n\t2. It queries for the current logged on user's local username\n\t\n\tThe game then creates game stat and replay files based on the hostname, username, and stage number in the following format, for example:\n\t\taverageinfo_MyComputerName_MyLocalUserName_stage0xx.txt\n\t\tplayinfo_MyComputerName_MyLocalUserName_stage0xx.txt\n\t\treplay_MyComputerName_MyLocalUserName_20250518_130802.rep  (this filename also records the date and time)\n\n\tThe game will start writing these files into one of the \"playrecord\\stage0xx\" folders as each level gets played.\n\n\tIf you're a privacy advocate, you will want to ensure you delete these files after playing the game on your own PC before sharing the game files to someone else.\n\n- The \"prjMonkey_tv_final.exe\" game file is patched to run in 1920x1080.\n\n- The game's native resolution is 1280x720.  The closest patch is 1280x768.\n\n- There are additional patched executables available which will force the game window to run in a specific resolution - these executables work fine in TP. Standard 4:3 resolutions will not look correct and the right side of the screen will get cut off, as the game is natively widescreen. Use a widescreen resolution for best results.  I have placed these patched exe's in the \"various patched resolutions\" folder.  Simply rename the existing exe and copy the executable you want to use into the main game folder.\n\n- If you have multiple monitors and select a patched resolution larger than your main monitor supports, the game will spread the game screen out over multiple monitors.\n\n- The game's service mode save files are located here:\n%USERPROFILE%\\AppData\\Roaming\\TeknoParrot\nSBVJ_sram.bin\nSBVJ_e2prom.bin\n\n- Use the \"test mode\" toggle in TPUI to enable running test mode if you want to change things like difficulty, ticket/amusement mode, and game time.\n- The game volume is set quite low, and there is no volume adjustment via the service menu. You'll need to crank up your speakers instead.\n\nRunning the game without TP:\n\n- Running \"Play.exe\" directly from the game folder will run the game in fullscreen (non-windowed) mode. Keyboard commands are:\n\tEsc or F11 = exit game\n\t0  or  F10 = insert coin\n\t1 or F9 = start coin \n\tPageUp / PageDown = volume +/-\n\tYou still need to use a trackball though, you won't get anywhere with a mouse.\n\t\n- Someone also setup XPadder as a standalone patch to work with \"Play.exe\", so you can play the game with your gamepad as TP does not currently support movement on gamepads at this time. \n - Install AutoHotKey\n - run XPadder.exe once and add the file association (.xpadderprofile).  You can do this either during the XPadder setup, or in the settings (main window, wrench icon in top right, select Installation, and click on Associate files) \n - run \"Run_Super_Monkey_Ball_Ticket_Blitz.ahk\"\n - game will only run with its default settings and set for ticket redemption (meaning you'll likely never get a jackpot)\n \nIt's better to just do it manually,\n - run XPadder.exe\n - to the left of the word \"XpadderProfile\" is a button that looks like a document. Click on that and select \"Open\"\n - open the file \"XpadderProfile.xpadderprofile\"\n - leaving XPadder running, run Play.exe and you'll now be able to control the monkey with your gamepad.  Press ESC to exit the game, and close the XPadder window. \n - in Settings > Options, if you enable \"AutoOpen last used profile\", it will reopen the profile when you run it so you don't have to do it repeatedly."},{"profile_name":"SuperStreetFighterIVArcadeEdition","game_name":"Super Street Fighter IV: Arcade Edition","archive_name":"Super Street Fighter IV Arcade Edition (2010-09-14)[Taito Type X2][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Taito Type X2","linked_profile":"","is_secondary":false,"setup_exe":"launcher.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"launcher.exe = NESYS \n\nNESYS doesn't work so there is no game saving.\n\nService Menu Password: S2K7MB4Q\nunlocks Evil Ryu and Oni (both CPU and Playable)\n\nUpon first start, go into service menu and set the following:\n1. Coin input does NOT work, so set the game to FREE PLAY\n2. set English and Japanese language\n3. enter password for extra characters\n\nThe game will save configuration data to the OpenParrot folder"},{"profile_name":"SuperStreetFighterIVArcadeEditionEXP","game_name":"Super Street Fighter IV: Arcade Edition (Export)","archive_name":"Super Street Fighter IV Arcade Edition (2010-11-04)(EXP,Standalone)[Taito Type X2][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Taito Type X2","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"game.exe =  Export\n\nService Menu Password: TYV2BQ9C\nunlocks Evil Ryu and Oni (both CPU and Playable)\n\nUpon first start, go into service menu and set the following:\n1. Coin input does NOT work, so set the game to FREE PLAY\n2. set English and Japanese language\n3. enter password for extra characters\n\nTHIS VERSION WILL NOT WRITE CONFIG DATA, I guess the TP Devs forgot to do this."},{"profile_name":"SuperStreetFighterIVArcadeEditionVer2012","game_name":"Super Street Fighter IV: Arcade Edition Ver. 2012","archive_name":"Super Street Fighter IV Arcade Edition Ver 2012 (1.1)(2011-10-18)[Taito Type X2][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Taito Type X2","linked_profile":"","is_secondary":false,"setup_exe":"launcher.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Service Menu Password: S2K7MB4Q\nunlocks Evil Ryu and Oni (both CPU and Playable)\n\nUpon first start, go into service menu and set the following:\n1. Coin input does NOT work, so set the game to FREE PLAY\n2. set English and Japanese language\n3. enter password for extra characters\n\nTHIS VERSION WILL NOT WRITE CONFIG DATA, I guess the TP Devs forgot to do this."},{"profile_name":"SAO","game_name":"Sword Art Online Deep Explorer","archive_name":"Sword Art Online Deep Explorer (33.11)(2022-05-25)[Namco BNA1-ES4][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"Namco BNA1/ES4","linked_profile":"","is_secondary":false,"setup_exe":"game\\link.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"SAO134-1-NA-MPR0-L11\n\n- Game is TOUCHSCREEN, so use the mouse for in-game menu stuff\n- I can't get the service menu to work.  \\testmode\\TestMode.exe is a separate executable, but can't be run on its own as it just crashes.  Gives a tiny glimpse of the service menu before it does though.\nas this game is a redemption game, it would be nice to see if there is an amusement mode in there that can be toggled"},{"profile_name":"Synchronica","game_name":"Synchronica","archive_name":"Synchronica (3.67.08)(2019-09-12)(JPN)[Namco ES3][TP]","genre":"Rhythm","tp_loader":"TeknoParrot","arcade_system":"Namco System ES3","linked_profile":"","is_secondary":false,"setup_exe":"app\\sync_release.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- this is version 3.67.08, which is the final offline version.\n- all songs are unlocked (I believe..)\n- as a touchscreen game, use your mouse to perform your in-game actions.\n- you're going to quickly find out that you can't play the game with a singlemouse.. you need at touchscreen monitor with multi-touch input. Synchronica can expect up to 4 simultaneous inputs, so you're likely looking at a 10-point touchpanel.\n\n---\n\nreference:   3 ini files in the \\app folder:\n\nes3_rom_user.ini\ntoho_marker_distribute.ini\nuser.ini\n\nthese ini files are very similar and have most of the same entries between them.\n\n---\n\nlog file creation can be bypassed by modifying the ini entries. it's not entirely helpful to not have a log file, but i'd rather have the game run without this issue than to worry if the game is going to crash when i'm playing.  ini changes are:\n\nenable_output_error_log_file = false  (default true)\ncreate_dump_on_assert = false   (default true)\nenable_error_log_upload = false  (default true) - turned this one off just in case, but might be an upload feature to Namco's servers in the past.\n\nThere is a \"logging.ini\" file with this entry:\nenable_auto_logging = true\n\nThe description is \"The function that automatically saves load measurement logs during performance\".\n\n---\n\nfile timestamp warnings in command window output:\n\n[WARNING] '\"D://Synchronica/data/scene/common/matching_setting.xtalc\"' is older than '.xtal' file\n\n- the game is performing an internal timestamp check on its files, and wants the .xtalc files NEWER than the matching .xtal files\n- Having the .xtalc and .xtal files with the same timestamp is not good enough and will cause the warning to appear.\n- probably not an issue as the console window is hidden for most users, BUT.. loading the assets in the game slows down when it's blasting the console window with these warning messages.  I can tell a noticeable difference in the lag between screens when the user touches \"play\" to finalize track selection, and the starting of the gameplay. It can be up to 5 seconds of lag.  When warnings are being supressed, the switch between the windows is almost instant.\n\n- this can be disabled by editing the ini files:\n\nignore_xtalc = true (default false)\n\nThe only time this warning would start showing itself is if people zipped the game folder with torrentzip or zip-zstd compression, which standardizes all the timestamps to the same value.\n\npersonally, I wrote a quick python script to recursively set all .xtalc files one minute newer than its matching .xtal files.  this stopped the warnings from showing up in the command line window. this is not an ideal fix, only to document the .xtalc files need to be \"newer\" than its matching .xtal\n\n---\n\nYou can bypass the boot warm-up/initialize completely and game goes directly to the notice screen.\n\nI just documented this because it's a nice feature.  Enabling it gave me no problems with touch calibration when it is bypassed. The game was matching the mouse input perfectly to the game screen and you can see the X,Y coords in the console window of where the player clicked and it's accurate. Change the following entries in the 3 aforementioned .ini files:\n\nenable_warm_up_mode = false  (default true)\n\n[self_check]\n; セルフチェック画面で各種チェックを行うか\nenable = false\t\t(default true)"},{"profile_name":"taiko10","game_name":"Taiko no Tatsujin 10","archive_name":"Taiko Drum Master 10 (2007)[Namco System 246][TP]","genre":"Rhythm","tp_loader":"pcsx2x6","arcade_system":"Namco System 256","linked_profile":"","is_secondary":false,"setup_exe":"NM00041.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"taiko11","game_name":"Taiko no Tatsujin 11","archive_name":"Taiko Drum Master 11 (2008)[Namco System 246][TP]","genre":"Rhythm","tp_loader":"pcsx2x6","arcade_system":"Namco System 256","linked_profile":"","is_secondary":false,"setup_exe":"NM00044.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_st e the cache/shader files, which are stored in the RPCS3\\cache folder.  Once they've been created once, subsequent game boots will be significantly faster."},{"profile_name":"TaisenHotGimmick5","game_name":"Taisen Hot Gimmick 5: Mirai Eigou","archive_name":"Taisen Hot Gimmick 5 - Mirai Eigou (2.04)(2005-12-08)(JPN)[Taito Type X][TP]","genre":"Puzzle","tp_loader":"OpenParrot","arcade_system":"Taito Type X","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- This game's inputs are not fully supported in TeknoParrot, so the game is not playable. The workaround for this is to use the TTX-Monitor+ loader, which supports the game's full set of inputs by hooking the JVS interface to your keyboard. This is the rare exception I made for including a 3rd party loader so the game can be played. Perhaps someday the devs can natively add all the required buttons so you won't need to use a separate loader.\n\n- From the game folder, run TTX-Config.exe and setup your keyboard keys. Run TTX-Loader.exe to run the game.\n- GAME ONLY WORKS WITH ONE MONITOR TURNED ON. If you have any other extra monitors on your PC turned on, you'll need to turn them off to play the game.  \n\nIf you try to run the game with multiple monitors turned on, you'll end up with a popup window that has a title of \"ƒXƒy[ƒXƒCƒ“ƒx[ƒ_[\" and some mojibake line that starts with \"MTS\", which when deciphered it is saying something to the effect of \"MTS system initialization failed\".  The game is basically saying it can’t talk to its MTS subsystem (Taito’s Multi Terminal System, basically the NESiCAxLive network/auth layer).  The only thing I can think of is TPUI getts messed up with multiple monitor sources when it tries to handle the Nesys patching/hooking.  If I'm wrong, please correct me as I'd really enjoy knowing!\n\nIf you play the game and then turn on a 2nd monitor, the game will crash.  \n\nI know mahjong games aren't everyone's cup of tea, but it would be nice to see them not need workarounds."},{"profile_name":"TankTankTank","game_name":"Tank! Tank! Tank!","archive_name":"TANK! TANK! TANK! (rev 1.03.14)(2010-02-26)[Namco ES1][TP]","genre":"Action","tp_loader":"ElfLdr2","arcade_system":"Namco ES1","linked_profile":"","is_secondary":false,"setup_exe":"n_tank_release","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"TargetBravo","game_name":"Target Bravo: Operation G.H.O.S.T.","archive_name":"Target Bravo - Operation G.H.O.S.T. (2016)[Sega RingWide][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"gs2.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"UNTESTED: Set region modes both to JAPAN so any changes made in the test menu are saved\n\nGame has multiple languages: EN, SPA, PT-BR, TK, RU (set via test menu)\n\nNVRAM is stored in C:\\Users\\<username>\\AppData\\Roaming\\TeknoParrot\nSDDV_sram.bin\nSDDV_e2prom.bin\n\n- Calibrate the guns in the test menu.\n\nTO GET THIS GAME WORKING PROPERLY IN FULL SCREEN\n------------------------------------------------\n\n- hippopippo fixed the fullscreen issue by patching the exe. It is also patched for 1080p\n\n- unlike the original OpGhost, this updated game version works with Player1 controls.\n\n- c tus":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Target - Terror Gold Enhanced (audio fixed)(2.12)(2009-05-16)[Raw Thrills Linux PC][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"There are three Raw Thrills eras which used different game engines, and the earliest had hard coded path length limits.  These limits MUST not be ignored when setting up these games!  This is a game that will require game folder renaming after you extract it, or else you're just going to run into problems running the game.  See the \"RAW THRILLS path length limits\" section in this document for all the details.\n\n~64-character limit (old engine, strictest):\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"TTG\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\n- Setup controls for PLAYER2, otherwise you won't have any controls\n- the News reporter has a quiet voice  vs the blasting reporter music in the background.  I'm going to work on jacking up the audio on her voice to make it stand out better vs. the background music.\n\n- If you do a factory reset in the test menu, the next time you start your game, it will crash as the game is NOT generating one of the needed save files.\n\t-\tin the \"save\" folder, create an empty file with the name \"07\" with no extension\n\t-\tstart the game\n\t\nThe \"mainpls.txt\" in the \\data\\sounds\\ folder is a playlist for all the .wav files in the game (or at least most of them, there are some that don't even exist). \n\n\"Target - Terror Gold Enhanced\" (TTGE)\n\n- This is my own personally edited version.  I heard enough people say some of the game audio was hard to hear. If you don't like it, you don't have to use it.\n- I fixed the wav file responsible for making Carrie's voice very difficult to hear clearly during her news reports.\n\\data\\sounds\\music\\news-loop.wav    \n\n- fixed the wav file responsible for making the checkpoints a moisy mess and also drowns out the female voice checkpoint announcer:\n\\data\\sounds\\music\\newsloop.wav\n- This is also the track that plays on the very first level select screen off of the main menu.\n - applied custom macro bulk edits\n - Effect > Amplify > -12.0db \n\nall other wav's changed:\n - applied custom macro bulk edits: normalize, compressor, filter curve EQ, normalize\n - tightened up the sounds and make them a bit more audible and punchier."},{"profile_name":"tatsuvscap","game_name":"Tatsunoko vs. Capcom","archive_name":"Tatsunoko vs. Capcom (A07)(2008-11-05)(2008)[Nintendo RVA][TP]","genre":"Fighting","tp_loader":"Dolphin","arcade_system":"Capcom System 256","linked_profile":"","is_secondary":false,"setup_exe":"TeknoParrot\\CrediarDolphin\\User\\Wii","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- the contents of the \"Wii\" game folder goes in TPUI's \"CrediarDolphin\\User\\Wii\" folder.  \n\nFor example:\n\nC:\\TeknoParrot\\CrediarDolphin\\User\\Wii\n \nWii folder will look like:\n\timport\\\n\tmeta\\\n\tshared1\\\n\tshared2\\\n\tsys\\\n\tticket\\\n\ttitle\\\n\ttmp\\\n\twfs\\\n\tfst.bin\n\tkeys.bin"},{"profile_name":"technicb","game_name":"Technic Beat","archive_name":"Technic Beat (2002)[Namco System 246][TP]","genre":"Rhythm","tp_loader":"pcsx2x6","arcade_system":"Namco System 246","linked_profile":"","is_secondary":false,"setup_exe":"NM00003.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status"
