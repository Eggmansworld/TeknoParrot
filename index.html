<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Community resource for TeknoParrot arcade game compatibility, notes, and setup information.">
<title>Eggman's TeknoParrot Collection</title>
<style>
:root {
  --c-red:    #EF4444; --c-orange: #F97316; --c-yellow: #EAB308;
  --c-green:  #22C55E; --c-blue:   #3B82F6; --c-violet: #A855F7;
  --s-work:   #006400; --s-work-bg:   #e8f5e9;
  --s-part:   #92600A; --s-part-bg:   #fff8e1;
  --s-broke:  #b71c1c; --s-broke-bg:  #ffebee;
  --s-untest: #555555; --s-untest-bg: #f0f0f0;
  --gpu-ok:   #006400; --gpu-issue: #92600A; --gpu-no: #999;
  --hdr-bg:   #0f0f23; --body-bg: #f4f5f7;
  --card-bg:  #ffffff; --border:  #e0e0e0;
  --txt:      #1a1a2e; --txt-dim: #666;
  --radius: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Segoe UI", system-ui, sans-serif; background: var(--body-bg);
       color: var(--txt); font-size: 14px; line-height: 1.5; }
a { color: var(--c-blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Rainbow strip */
#rainbow { display: flex; height: 5px; }
#rainbow span { flex: 1; }

/* Header */
header {
  background: var(--hdr-bg);
  padding: 20px 32px 18px;
  display: flex; align-items: center; gap: 20px;
}
header img#logo {
  height: 80px; width: 80px; object-fit: contain; border-radius: var(--radius);
  flex-shrink: 0;
}
.hdr-text h1 { color: #fff; font-size: 1.75rem; font-weight: 700; }
.hdr-text p  { color: #aab; font-size: 0.9rem; margin-top: 3px; }
.hdr-links   { margin-left: auto; display: flex; gap: 10px; flex-shrink: 0; }
.hdr-links a {
  color: #ccd; font-size: 0.82rem; border: 1px solid #445;
  padding: 4px 10px; border-radius: 20px;
}
.hdr-links a:hover { border-color: #aab; color: #fff; text-decoration: none; }

/* Stats bar */
#stats {
  background: var(--hdr-bg); border-top: 1px solid #1e1e3a;
  padding: 10px 32px 12px;
  display: flex; gap: 20px; flex-wrap: wrap;
}
.stat-pill {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.07); border-radius: 20px;
  padding: 3px 12px; font-size: 0.82rem;
}
.stat-pill .val { font-weight: 700; color: #fff; font-size: 0.95rem; }
.stat-pill .lbl { color: #99a; }
.stat-pill.work .val { color: #6ee764; }
.stat-pill.part .val { color: #fbbf24; }
.stat-pill.broke .val { color: #f87171; }
.stat-pill.untest .val { color: #9ca3af; }

/* Filters */
#filter-bar {
  background: #fff; border-bottom: 2px solid var(--border);
  padding: 12px 32px; display: flex; gap: 10px; flex-wrap: wrap;
  align-items: center; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
#filter-bar input, #filter-bar select {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 10px; font-size: 0.88rem; font-family: inherit;
  background: #fafafa; color: var(--txt);
}
#filter-bar input { flex: 1; min-width: 200px; }
#filter-bar input:focus, #filter-bar select:focus {
  outline: none; border-color: var(--c-blue); box-shadow: 0 0 0 2px #bfdbfe;
}
#clear-btn {
  background: none; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 6px 12px; cursor: pointer; font-size: 0.82rem; color: var(--txt-dim);
}
#clear-btn:hover { border-color: #999; color: var(--txt); }
#result-count { margin-left: auto; font-size: 0.82rem; color: var(--txt-dim); white-space: nowrap; }

/* Table */
.tbl-wrap { padding: 16px 32px 40px; }
table { width: 100%; border-collapse: collapse; }
thead th {
  background: #1a1a2e; color: #ccd; font-size: 0.78rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: .05em;
  padding: 8px 10px; text-align: left; position: sticky; top: 57px; z-index: 50;
}
thead th:first-child { width: 34px; }
thead th.col-status { width: 105px; }
thead th.col-gpu    { width: 80px; text-align: center; }
thead th.col-loader { width: 120px; }
thead th.col-system { width: 170px; }
tbody tr.game-row {
  background: var(--card-bg); border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .12s;
}
tbody tr.game-row:hover { background: #f0f4ff; }
tbody tr.game-row.expanded { background: #eef2ff; }
tbody tr.detail-row { background: #f9faff; }
tbody tr.detail-row td {
  padding: 0; border-bottom: 2px solid #c7d2fe;
}
.detail-inner {
  padding: 16px 24px 18px 48px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px 32px;
}
td { padding: 9px 10px; vertical-align: middle; }

/* Expand arrow */
.arrow { display: inline-block; width: 18px; height: 18px; line-height: 18px;
          text-align: center; font-size: 0.7rem; color: #888; user-select: none;
          transition: transform .15s; }
.expanded .arrow { transform: rotate(90deg); color: var(--c-blue); }

/* Game name cell */
.gname { font-weight: 600; color: var(--txt); }
.gsub  { font-size: 0.78rem; color: var(--txt-dim); margin-top: 1px; }
.gsub .archive { font-family: "Consolas","Courier New",monospace;
                  color: #4a5568; font-weight: 500; }
.tag-secondary { font-size: 0.7rem; background: #dbeafe; color: #1d4ed8;
                  border-radius: 3px; padding: 1px 5px; margin-left: 5px;
                  vertical-align: middle; font-weight: 500; }

/* Status badge */
.badge {
  display: inline-block; font-size: 0.72rem; font-weight: 700;
  padding: 2px 9px; border-radius: 12px; white-space: nowrap;
}
.b-working  { background: var(--s-work-bg);   color: var(--s-work);  }
.b-partial  { background: var(--s-part-bg);   color: var(--s-part);  }
.b-broken   { background: var(--s-broke-bg);  color: var(--s-broke); }
.b-untested { background: var(--s-untest-bg); color: var(--s-untest);}

/* GPU indicators */
.gpu-row { display: flex; gap: 4px; justify-content: center; }
.gpu-dot {
  font-size: 0.65rem; font-weight: 700; width: 20px; height: 20px;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  title: attr(title);
}
.gpu-ok    { background: #dcfce7; color: var(--gpu-ok); }
.gpu-issue { background: #fff3cd; color: var(--gpu-issue); }
.gpu-no    { background: #f0f0f0; color: var(--gpu-no); }
.gpu-na    { background: #f0f0f0; color: #ccc; }

/* Detail sections */
.detail-section { margin-bottom: 4px; }
.detail-section h4 {
  font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .06em; color: #7c3aed; margin-bottom: 5px;
}
.detail-notes {
  grid-column: 1 / -1;
  background: #fff; border: 1px solid #e0e7ff; border-radius: var(--radius);
  padding: 10px 14px; font-size: 0.88rem; white-space: pre-wrap;
  word-break: break-word; color: var(--txt); line-height: 1.6;
  max-height: 200px; overflow-y: auto;
}
.hw-table { font-size: 0.82rem; width: 100%; border-collapse: collapse; }
.hw-table td { padding: 3px 8px 3px 0; vertical-align: top; }
.hw-table .hw-gpu  { font-weight: 600; width: 60px; color: #374151; }
.hw-table .hw-stat { width: 90px; }
.hw-table .hw-iss  { color: var(--txt-dim); font-style: italic; }
.detail-exe { font-family: "Consolas","Courier New",monospace;
               font-size: 0.82rem; color: #374151; }
.detail-exe span { color: var(--txt-dim); font-family: inherit; font-size: 0.78rem; }
.tag-pill {
  display: inline-block; background: #ede9fe; color: #5b21b6;
  border-radius: 10px; padding: 1px 8px; font-size: 0.75rem;
  margin: 2px 3px 2px 0;
}
.supp-list { font-size: 0.82rem; color: var(--txt-dim); }
.updated-line { font-size: 0.75rem; color: #9ca3af; margin-top: 6px; }
.no-results {
  text-align: center; padding: 60px 20px; color: var(--txt-dim);
  font-size: 1rem;
}

/* Footer */
footer {
  background: var(--hdr-bg); color: #667; font-size: 0.8rem;
  padding: 16px 32px; text-align: center; border-top: 1px solid #1e1e3a;
}
footer a { color: #88a; }

/* Responsive */
@media (max-width: 768px) {
  header { padding: 14px 16px; gap: 12px; }
  header img#logo { height: 52px; width: 52px; }
  .hdr-text h1 { font-size: 1.2rem; }
  #stats { padding: 8px 16px; }
  #filter-bar { padding: 10px 16px; }
  .tbl-wrap { padding: 10px 8px 32px; }
  thead th.col-loader,
  thead th.col-system { display: none; }
  td.col-loader, td.col-system { display: none; }
  .detail-inner { grid-template-columns: 1fr; padding: 12px 14px; }
}
</style>
</head>

vice menu, there is no way to make any changes to the orientation of the screen."},{"profile_name":"acedriv3","game_name":"Ace Driver 3","archive_name":"Ace Driver 3 Final Turn (2001)[Namco System 256][TP]","genre":"Racer","tp_loader":"pcsx2x6","arcade_system":"Namco System 246","linked_profile":"","is_secondary":false,"setup_exe":"NM00047.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Namco System 246\n- CHD is GDDD format\n- game starts"},{"profile_name":"ActionDeka","game_name":"Action Deka","archive_name":"Action Deka (2008-03-28)[Konami PC][TP]","genre":"Action","tp_loader":"TeknoParrot","arcade_system":"Konami PC Based","linked_profile":"","is_secondary":false,"setup_exe":"deka.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- doesn't work on Intel GPU\n- this is another game that makes the player use the PLAYER 2 side if you want to play the game solo.  Setup your controls in TPUI for PLAYER 2 inputs if you are going to play a solo game.\n\nThe game can be a bit tempermental starting up, especially after modifying the game controls.  If the game exits a short time after starting it (within 10 seconds), simply restart the game and it should work.\n\nMake sure you have your \"Change Control Mode\" button configured (i like setting it to the space bar, easy enough to hit). Otherwise, you won't be able to change between modes (shooting, fighting, driving etc).  The game starts with no control mode selected, so be sure to select a mode when a level begins or otherwise your buttons probably won't do anything."},{"profile_name":"abc","game_name":"After Burner Climax","archive_name":"After Burner Climax (1.0 Rev B)(2006-06-19)(JPN,USA,EXP)[Sega Lindbergh Yellow][TP]","genre":"Flying","tp_loader":"Lindbergh","arcade_system":"SEGA Lindbergh Yellow","linked_profile":"abcELF2","is_secondary":false,"setup_exe":"abc","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"Game has no shadows","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- doesn't work on Intel\n\nexe: abc\nexe: abc 1080p\nexe: abc_org"},{"profile_name":"abcELF2","game_name":"After Burner Climax (Elfloader2)","archive_name":"After Burner Climax (1.0 Rev B)(2006-06-19)(JPN,USA,EXP)[Sega Lindbergh Yellow][TP]","genre":"Flying","tp_loader":"ElfLdr2","arcade_system":"SEGA Lindbergh Yellow","linked_profile":"abc","is_secondary":true,"setup_exe":"abc","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"AfterDark","game_name":"After Dark","archive_name":"After Dark (2.3)(2013)[UNIS PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"UNIS PC Based","linked_profile":"","is_secondary":false,"setup_exe":"GamePlayer.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"After Dark (1.1)(2013)[UNIS PC][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- 4GB patch was required to be applied on original GamePlayer.exe\n- game works\n- if you have audio issues, install https://github.com/nevcairiel/lavfilters/releases"},{"profile_name":"AkaiKatanaShinNesica","game_name":"Akai Katana Shin for NESiCAxLive","archive_name":"Akai Katana Shin (2012-07-12)[Taito NESiCAxLive][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"","is_secondary":false,"setup_exe":"Game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"Akuma","game_name":"Akuma","archive_name":"Akuma Mortis Immortal (2005)[GameWax PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"GAMEWAX PC Based","linked_profile":"","is_secondary":false,"setup_exe":"data\\game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"THIS GAME DOES NOT WORK WITH 12th-14th GEN INTEL CPU'S (not GPU.. I'm talking about the CPU).  You can set everything up perfectly, but the TRIGGERS will not work. Does not matter if you try mapping them to a controller or keyboard either.. the triggers simply will not work.  I can only personally confirm that a 13th gen Core i7 will not work, the other reports come from other users.\n\nI have playtested with TPUI and I can conform that the game is fully working on an 11th Gen Intel CPU.  Game should work with the older gen CPU's too.\n\nGame setup:\n- on Game.exe, set compatability mode to Windows XP SP3\n- run TPUI as administrator for this game (for compatability mode to work)\n- setup game using RawInput, HideCursor, FpsLimitEnable (60), Crosshair Enable, Bezel Enable.\n- map light gun to mouse.  \n- play game.\n\nThe \"expdat\" and \"extdat\" files are the patched versions of the NVRAM which has Free Play enabled (this is how you know you're using the patches files). Trying to use the \"original\" versions of these two files will result in no inputs working at all, and the game will no longer be in Free Play mode.  These two files do eventually get modified when any input configurations are changed in TPUI, hence why the \"original\" and \"patched\" folders are included.\n\nIf you have your own crosshairs, scale them down to about 64x64 pixels so they're not super large on the screen.  The game window runs at your native desktop resolution, but the game runs at a resolution way lower (looks like 640x480).\n\nThis game sucks anyway.\n\nRun patched standalone:\n- from the \"patched\" folder, copy all the files into the root of the \"data\" folder, overwriting existing files.\n- on Game.exe, set compatability mode to Windows XP SP3\n- run \"Game.exe\" and use the following keys for inputs:\n\nKeys:\nS - Service\nT - Test mode\nQ - P1 Start\nE - P2 Start\nC - Coin\nMouse button 1 - Trigger P1\nMouse button 2 - Trigger P2\nMouse move - Gun X/Y\n\nPatched and I/O board emulated by Andy Geezer"},{"profile_name":"AliensArmageddon","game_name":"Aliens Armageddon","archive_name":"Aliens Armageddon (03.90)(2014-10-08)[Raw Thrills Linux PC][TP]","genre":"Shooter","tp_loader":"ElfLdr2","arcade_system":"RAW Thrills Linux PC Based","linked_profile":"","is_secondary":false,"setup_exe":"game","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"There are three Raw Thrills eras which used different game engines, and the earliest had hard coded path length limits.  These limits MUST not be ignored when setting up these games!  This is a game that will require game folder renaming after you extract it, or else you're just going to run into problems running the game.  See the \"RAW THRILLS path length limits\" section in this document for all the details.\n\n~96-character limit (mid-era engine):\nThese titles used the Phoenix or early Unicorn loader. They’ll choke above 96, but 80–90 is still safest. These usually run on Linux builds with slightly safer path logic (longer structs), but still choke >96.\n\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"ALIENS\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\n\n- everything is shadowed and dark\n\t- INTEL GPU has this problem, can't be fixed.\n\t- if you're using an integrated NVIDIA GPU (such as on a laptop):\n\t\t- open the NVIDIA control panel\n\t\t- select Manage 3D settings\n\t\t- In the Global Settings tab, under \"Preferred graphics processor\", use the pulldown menu and select the NVIDIA processor (sometimes it will default to the integrated graphics option)\n- \\g6\\aa\\pmuser\\gamelog.txt has a wealth of troubleshooting\n- lots of user-specific files are updated in various folders here:  \\g6\\aa\\pmuser\\\n- if your attract sequence crashes:  reset high scores in the service menu\n\nto program the menu, map both p1 and p2 to the same mouse. mouse navigation with trigger will then work for the menu.\n\nGame also works with a game controller.  Your luck may vary for setting up with RawInput."},{"profile_name":"AliensExtermination","game_name":"Aliens: Extermination","archive_name":"Aliens Extermination (1.0.3)(2006-12-21)(USA)[Global VR PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"Global VR PC Based","linked_profile":"","is_secondary":false,"setup_exe":"DATA\\aliens dehasped.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"" , both exe's play the same, with no visual differences to tell between them (at least none that I could see).  \n\nI've selected the MAME cvgame.exe as the main exe, and kept the altered version as \"cvgame.exe.f9f619ae\"\n\nCleaned up additional loader files that don't belong:\nds2_monitor.dll\nmonitor_input.bin\nmonitor_opt.bin\nDSII_Icon.ico\n\nIn the RES folder, when you start the game for the first time, the \"_gdata987.rpm\" gets written to.  I would assume this may be some sort of setting file.\n\nOther than some minor random flickering and graphical issues, the game is playable."},{"profile_name":"FightingClimax","game_name":"Dengeki Bunko: Fighting Climax","archive_name":"Dengeki Bunko - Fighting Climax (1.30.01)(2014-12-15)[Sega RingEdge 2,APM2][TP]","genre":"Fighting","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge 2","linked_profile":"","is_secondary":false,"setup_exe":"RingGame.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Dengeki Bunko - Fighting Climax (1.01.00)(2014-03-18)[Sega RingEdge 2,APM2][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"DengekiBunkoFightingClimax","game_name":"Dengeki Bunko: Fighting Climax APM3 Edition","archive_name":"Dengeki Bunko - Fighting Climax (APM3 Edition)(2.32)(2021)[Sega ALLS][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"SEGA ALLS","linked_profile":"","is_secondary":false,"setup_exe":"DengekiFCI_APM3.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"DenshaDeGo","game_name":"Densha de Go!!","archive_name":"Densha de Go!! (5.80.02)(2019)(JPN)[Taito Ty move it to another drive letter such as C:\n- controls work, but gets stuck on card issuance screen -- no way to take or insert card(?)\n\nIf you have multiple monitors:\n1. If you set the game to run fullscreen, it will open the game window on your main monitor where TPUI is.\n2. If you set the game to run windowed, it will drop the resolution of your main monitor to something extremely low, like 640x480, then move the game window over to your secondary monitor.\n\nGame is really struggling to be a game."},{"profile_name":"DirtyDrivin","game_name":"Dirty Drivin'","archive_name":"Dirty Drivin' (1.14)(2011-05-11)[Raw Thrills PC][TP]","genre":"Racing","tp_loader":"OpenParrot","arcade_system":"Raw Thrills PC Based","linked_profile":"","is_secondary":false,"setup_exe":"sdaemon.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"~96-character limit (mid-era engine):\nThese titles used the Phoenix or early Unicorn loader. They’ll choke above 96, but 80–90 is still safest. These usually run on Linux builds with slightly safer path logic (longer structs), but still choke >96.\n\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"DRTYDR\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\nEnable \"General - AutoAcclOff\" if you don't want auto acceleration.\n\nGame works fine with XInput."},{"profile_name":"DoNotFallRunforYourDrink","game_name":"Do Not Fall: Run For Your Drink","archive_name":"Do Not Fall - Run for Your Drink (1.01)(2013-08-09)[Taito NESiCAxLive][TP]","genre":"Platform","tp_loader":"TeknoParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"DoodleJump","game_name":"Doodle Jump","archive_name":"Doodle Jump Arcade (1.28)(2014-04-14)[ICE-RT Linux PC][TP]","genre":"Platformer","tp_loader":"ElfLdr2","arcade_system":"ICE Linux PC Based","linked_profile":"","is_secondary":false,"setup_exe":"game","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":1,"supp_archives":"Doodle Jump Arcade (1.08NJS)(2012-08-30)[ICE-RT Linux PC][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Native resolution: 1360x768 or 1366x768\n\nBoth 1.08NJS and 1.28 versions work.  The New Jersey Street/\"NJS\" version is slightly different due to the strict gambling laws for redemption games in that US state. Both versions seem to play the same, so it comes down to how the ticket redemption works and the options available to set the game up in that state. While technically they're both at v1.28, there are 31 different files in the NJS version vs. the standard 1.28 version (including the main game elf). This is how they are versioned by ICE. For completeness sake and because TP runs both, I've added both to the collection. If you have more information about exactly what is changed for these stricter state versions please let me know, this kind of stuff is very interesting!\n\nDon't bother trying to play it with XInput - it seems the joystick only gives the game the left, center and right coordinates so your dude only jumps to those spots. And DirectInput.. nope.  Your only chance is with a mouse and RawInput. I suppose a trackball would work too, but I didn't test that.\n\nIf you obtained your dump from the internet, you may see a \"version.txt\" file (lowercase) in your \\data folder. If you move this file to the \\dj\\doodle folder and uppercase the file to VERSION.TXT, the correct game version will show in the test menu. Wow, eh.\n\nSettings to make the game more enjoyable:\ntest menu > Payout Adjustments > Amusement Only\n\t- disables the ticket stuff and lets you simply play the game\ntest menu > Leaderboard > enable \n\t- high scores! but not saved yet.\n\t\nProblems:\n- the game screen's viewable area is too narrow in landscape mode. This cuts a portion of the right edge of the screen. Needs to be fixed.\n- after you play one game, the next game you select may start with a game screen devoid of any platforms. You'll either bounce at the bottom indefinitely, or fall to your death and earn 1 point. It doesn't seem to matter which game mode you choose to play (space, classic or jungle).  It will happen randomly. The only course of action if you're stuck in an endless bounce is to exit the game.  If you get the instant death, you can start another game and with luck, the screen will populate with platforms like it should. This needs to be fixed.\n- the LEADERBOARD works great, but currently does not save. Would be a nice to have feature.\n\nDO NOT set the game to a higher resolution in TPUI, the game does not adjust the game's objects well above its default resolution of 768x1360. Things like text will appear smaller, but some areas will be expanded and empty, and it'll introduce a right-side letterbox if the resolution is set to something like 1080p.  it just won't look right.  Keep it at the game's default resolution.\n\nsettings marked *** is the best one to use.  Some games are really, really meant to be played in PORTAIT mode only. \n\nTPUI settings tested:\n\n--- ***\nFullscreen ENABLED\nPortrait DISABLED\nRES 768x1360\n- game plays in fullscreen portait mode\n- all game content is viewable\n- there are narrow black pillarboxes on both sides, which is normal (game screen does not quite make it to the edges of the screen)\n---\nFullscreen ENABLED\nPortrait DISABLED\nRES 1360x768: \n- game won't boot\n---\nWindowed ENABLED\nPortrait DISABLED\nRES 768x1360\n- game plays in windowed portait mode\n- all game content is viewable\n---\nWindowed ENABLED\nPortrait DISABLED\nRES 1360x768: \n- game window height too short and too wide, incorrect res \n---\nFullscreen ENABLED\nPortrait ENABLED\nRES 768x1360: \n- game plays in fullscreen landscape mode\n- content cut off left and right side\n- text at bottom is squished in (most noticeable when you start and play a game)\n---\nFullscreen ENABLED\nPortrait ENABLED\nRES 1360x768: \n- game plays in fullscreen landscape mode\n- content cut off left and right side\n- text at bottom is squished in (most noticeable when you start and play a game)\n---\nFullscreen DISABLED\nPortrait ENABLED\nRES 768x1360: \n- game plays in windowed portait mode\n- window randomly places itself somewhere near the top of the monitor, but not high enough.\n- all game content is viewable, however the bottom of the window falls below the taskbar, cutting off the bottom portion of the window.\n---\nFullscreen DISABLED\nPortrait ENABLED\nRES 1360x768: \n- game window height too short and too wide, incorrect res"},{"profile_name":"dbzenkai","game_name":"Dragon Ball Zenkai Battle Royale","archive_name":"Dragon Ball Zenkai Battle Royale (3.26.01)(2017-12-25)[Namco System 357][TP]","genre":"Fighting","tp_loader":"RPCS3","arcade_system":"Namco System 369","linked_profile":"","is_secondary":false,"setup_exe":"dev_hdd0\\game\\SCEEXE000\\USRDIR\\EBOOT.BIN","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"ROM:  DZB326-1-ST-MPR0-A01  Dec 25 2017\n\n- Languages available: Japanese\n- First boot will take 2-3 minutes for RPCS3 to create the cache/shader files, which are stored in the RPCS3\\cache folder.  Once they've been created once, subsequent game boots will be significantly faster.\n\nIf your test menu is not saving, go into dev_hdd0\\game\\SCEEXE000\\USRDIR\\SAVEDIR_CFG0 and rename _CONFIG.DAT to just CONFIG.DAT (basically remove the underscore). do the same in the SAVEDIR_CFG1 folder."},{"profile_name":"DragonDanceNesica","game_name":"Dragon Dance for NESiCAxLive","archive_name":"Dragon Dance (2011)[Taito NESiCAxLive][TP]","genre":"Puzzle","tp_loader":"OpenParrot","arcade_system":"Taito NESiCAxLive","linked_profile":"","is_secondary":false,"setup_exe":"Game_liong.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"new EXE:  B2836DB7\n\nThis game is now using ddrawcompat as a fix.  The game will start with TPUI, but will get stuck on the NOTICE screen.\n\nOnce you are on the NOTICE screen, wait 10-15 seconds and you will hear a Windows exclamation sound.  Press the ENTER key on the keyboard and the game will start.  The game throws an \"failed to initialize audio mixer\" error in the background, and since the error window becomes the active window (but is covered up by the NOTICE screen), pressing the ENTER key selects the window's \"Close\" button. This allows the game to finish booting.  \n\nI've added a text message on the NOTICE screen to press the ENTER key.  It's about the only non-disruptive way I could come up with to handle this problem without the user having to do extra things.\n\nolder notes:\nThere is a workaround to force the game to start with TPUI by using the DDrawCompat dll.\n- download ddraw.dll from https://github.com/narzoul/DDrawCompat/releases\n- place the ddraw.dll in the root of the game folder, where \"game_liong.exe\" is\n- if they exist, rename, move or delete any other dll's in the main game folder.  iDmacDrv32.dll and ddraw.dll should be the only dll's in the game folder.\n- in TPUI, start the game.\n- the game will get stuck on the \"Notice\" screen\n- about 10-15 seconds after starting the game, you'll hear a windows exclamation sound in the background. This is the audio mixer failing to initialize.\n- Press the enter key, game will start\n\nAlternatively, \n- Press and HOLD down the ALT key, then press the TAB key\n- Still holding down the ALT key, use your mouse to hover over and close the window named \"ERROR\"\n- Still holding down the ALT key, click on the game window\n- release the ALT key\n- play the game.\n\nAnother annoying thing about this game is that it uses 2 Japanese fonts from the game's font folder. When you quit the game, the Windows OS does not release its hold on those 2 font files, which will not allow you to move or delete the font files or the font folder.  You'll have to reboot your PC in order to do so."},{"profile_name":"Drakons","game_name":"Drakons: Realm Keepers","archive_name":"Drakons Realm Keepers (227996 dev build)(2023)[Adrenaline PC][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"Adrenaline Amusements PC-Based","linked_profile":"","is_secondary":false,"setup_exe":"Game.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"SDR","game_name":"Dream Raiders","archive_name":"Dream Raiders (2012)[Sega RingWide][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"Game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_ NFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nUnplugged: Yes *\nHome Edition: n/a\n\n- Unplugged edition set by TPUI\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too)"},{"profile_name":"GoldenTeeLive2011","game_name":"Golden Tee Live 2011","archive_name":"Golden Tee Live 2011 (6.00.09)(2011-11-14)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nUnplugged: Yes *\nHome Edition: n/a\n\nHome Edition was not the primary \"mode name\" yet in IT's own announcement, and was still pushing Unplugged for offline play.\n\nNo problems to report on this game.\n\nThe build date for 2011 is oddly the same as 2010 and 2009.  I've been told the location for the build date is hardcoded in the game's source code.  It is possible these games all received a final update on the same date and that is why the build dates are all the same. Otherwise, I have no idea."},{"profile_name":"GoldenTeeLive2012","game_name":"Golden Tee Live 2012","archive_name":"Golden Tee Live 2012 (7.00.10)(2012-04-06)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nUnplugged: see notes\nHome Edition: Yes *\n\nUnplugged went through a transition period in ths year. Sellers were still using the \"Unplugged\" language around 2012, but IT was clearly pushing the \"Home Unit/Home Edition\" concept. IT's own news posts were explicitly talking about \"Golden Tee 2012 Home Unit\" and describing it as offline.\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\nNo problems to report on this game."},{"profile_name":"GoldenTeeLive2013","game_name":"Golden Tee Live 2013","archive_name":"Golden Tee Live 2013 (8.05.09)(2014-11-05)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes *\n\n2013 was the big switch. IT announced Home Edition officially online on April 1-2, 2013. They describe the hardware expecations like the added card reader and Ethernet connection path. IT’s Home Edition owner resources include update paths covering older year ranges (\"2005/6 to 2012 … update instructions\", \"2013–2014 … update instructions\", etc.), which is a strong hint that multiple yearly builds were supported under the Home Edition umbrella during this era.\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\nThis version adds some important graphics options such as MSAA, Shadow Resolution and Hires reflections.  If your GPU can handle it, definitely enable and tweak them to suit.\n\nRawInputTrackball input has been completely overhauled!\n\nRawInputTrackball:\n- this is the best option to use, as you do not need to worry about Mouse Speed or Windows Scaling\n- Set Teknoparrot X and Y axis sliders to 25%\n\nDinput:  \n\n- At 4k Resolution, set your Windows Scaling to 200%, Windows mouse speed to 3, and the Teknoparrot X,Y sliders to 100%\n- at 1080p Resolution, set your Windows Scaling to 100%, Windows mouse speed to 4, and the Teknoparrot X,Y sliders to 100%\n- You may need to use Dinput if you are using a gamepad encoder for your button input, as opposed to a keyboard encoder (iPac).\n- If using a Gamepad encoder, your other option is to use RawinputTrackball and use Joy2Key software to set your buttons.\n\nRecommended Hardware:  (other hardware does work, but these are recommended for an authentic to Golden Tee experience)\n\n- 3\" Happ Trackball with red boards - requires an Optiwiz (From GroovyGameGear)\nButton input requires an iPac or similar keyboard encoder.\n- Elwood's firmware with an Arduino replaces the need for both Optiwiz  and iPac..  You need an Arduino Micro/Leonardo (recommend ordering a presoldered device)\n\nMore info is on the TP Discord in the #golden-tee channel"},{"profile_name":"GoldenTeeLive2014","game_name":"Golden Tee Live 2014","archive_name":"Golden Tee Live 2014 (9.04.06)(2014-02-05)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes *\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\n- starting with the 2014 version, the TP user no longer needs to edit the database during initial setup, as TPUI autopopulates the database settings. There is still a setup guide, it's just a lot less work now.\n\nIf you have a black border around your screen:\n - start game and go into Test menu\n - Troubleshooting Shortcuts > Screen Size Adjustments > select \"Bigger\" until the test pattern is expanded to the screen edges.\n - exit test menu"},{"profile_name":"GoldenTeeLive2015","game_name":"Golden Tee Live 2015","archive_name":"Golden Tee Live 2015 (10.04.06)(2016-04-05)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes *\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\n- the TP user no longer needs to edit the database during initial setup, as TPUI now autopopulates the database settings during game startup.\n\nThe simulated dot matrix display at the top of the of native GT2015 attract mode can be quite annoying. Remove it by disabling the \"General - Enable Banner Message\" option in TPUI game settings.  If you choose to keep it, you can also set your own banner message using \"General - Banner Message\"."},{"profile_name":"GoldenTeeLive2016","game_name":"Golden Tee Live 2016","archive_name":"Golden Tee Live 2016 (11.04.10)(2016-08-05)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes *\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\n- the TP user no longer needs to edit the database during initial setup, as TPUI now autopopulates the database settings during game startup.\n\nThe simulated dot matrix display at the top of the of native GT2016 attract mode can be quite annoying. Remove it by disabling the \"General - Enable Banner Message\" option in TPUI game settings.  If you choose to keep it, you can also set your own banner message using \"General - Banner Message\".\n\nold method (no longer recommended):\nyou can forcibly remove it by deleting this line in golf\\configuration\\modetree\\modetree.txt:\n\tBannerScreenMode(BannerScreenModeClass) ->"},{"profile_name":"GoldenTeeLive2017","game_name":"Golden Tee Live 2017","archive_name":"Golden Tee Live 2017 (12.04.05)(2017-07-19)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes * (Go Edition)\n\nReference my \"Incredible Technologies Super Easy Universal Setup Guide\" on Github for assistance setting this game up (and all other IT games too) \n\nThe simulated dot matrix display at the top of the screen during attract mode can be quite annoying. Remove it by disabling the \"General - Enable Banner Message\" option in TPUI game settings.  If you choose to keep it, you can also set your own message using \"General - Banner Message\"."},{"profile_name":"GoldenTeeLive2018","game_name":"Golden Tee Live 2018","archive_name":"Golden Tee Live 2018 (13.04.24)(2018-04-05)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes\nHome Edition: Yes *\n\n- There are 7 courses added to this version - 5 new course, and 2 remade Golden Tee Fore courses.\n- There is a new ball spin type: RELEASE.  watch this video to learn about the new spin feature: https://www.youtube.com/watch?v=nUhAkYS3J-4\n- 2018 introduced ball trails, and normally the trails are only for premium balls. Thanks to the devs, you can enable ball trails on stock balls in the TPUI game settings.\n- all body clothing can be unlocked\n\nBall Trails:\n- Via TPUI game settings, select a ball color other than \"default\"\n- selecting a ball trail other than \"None\" will enable it and set it to \"always on\".\n- if you only want to see ball trails during your tee off shots, enable the \"Ball Trails on Drive Only\" option\n\n\"Save Current Outfit to TPUI\"\n- this is a new TP feature that when pressing the bound button while you are playing a round, the current clothing you're wearing will be saved to your TPUI game settings.  This feature will not work while you are in any menu, or the customization menu.  Again, it will only work during normal gameplay.  This feature will also create a \"teknoparrotgolfer.txt\" file in your game folder in case you want to transfer your golfer's setting to another PC or to a friend.\n\nScore Submissions:\n- the TP Dev responsible for coding the score submissions had a drive failure, resulting in the delay of implementing score submissions for Golden Tee 2018.  If you want to continue to submit scores and record videos, you will have to use GT 2017 or any earlier version that supports it until the dev gets themselves sorted out."},{"profile_name":"GoldenTeeLive2019","game_name":"Golden Tee Live 2019","archive_name":"Golden Tee Live 2019 (14.04.13)(2019-08-01)(USA)[IT Nighthawk][TP]","genre":"Sports","tp_loader":"ElfLdr2","arcade_system":"IT Nighthawk","linked_profile":"","is_secondary":false,"setup_exe":"game.bin","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"Select AMD Fix in settings to be able to play.","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game Edition Available in Game (* denotes the mode TP runs the game in):\nCommercial (Live): Yes *\nHome Edition: Yes\n\n- This release also fixes AMD GPU support, so THIS GAME ONLY now works properly on AMD graphics cards too. As noted by TP Dev PockyWitch, \"The main reason why 2019 was able to get an AMD patch is because IT rewrote a big chunk of the engine's rendering system. To be precise, 2006 to 2018 all use nvidias register combiners (which neither AMD nor Intel support) and use it for almost every surface and material in the game. However in 2019 they rewrote all of it to use normal shaders instead because android and ios do not support the nvidia functionality either, and seemingly the mobile game seems to be using the same game engine. So IT took away 90% of the reason GT didn't work on AMD, and I just had to iron out the last few smaller things.\"\n\n- the included backup has the attract volume set to zero. Once the game is running, go into the Operator Menu (test menu) and adjust the attract mode sound settings to your liking.\n\nNew supported features include:\n\n- Real Time Rivals – play against AI opponents based on real golfers and GT players like John Daly and Evan Gossett\n- Shot Meter – see your trackball hit speed and exact shot direction, so you can master your shots and spot what went wrong\n- More courses, outfits, clubs and balls\n- Slightly improved graphics once again\n\nGolden Tee Live 2019 (arcade) is widely praised by players for a few specific design, balance, and content choices that many feel make it superior to earlier and later versions:\n\n- Course design and variety: courses in 2019 are consistently well-balanced with memorable layouts, shot-shaping opportunities, and risk/reward holes that reward skillful play.\n- Ball physics and feel: many players prefer the 2019 shot physics — club/ball response, roll behavior, and putting feel — as more consistent and skill-expressive than some other releases.\n- Shot and spin mechanics: the game’s tuning for spin, curve, and power allowed a wider variety of advanced shots (controlled draws/fades, soft-touch chips) while remaining accessible.\n- Tournament and ranking systems: the 2019 Live version’s online tournament formats, leaderboard structure, and prize/point progression were seen as well-tuned for competitive play and player retention.\n- Course selection rotation and updates: the mix and rotation of courses in 2019 kept gameplay fresh without introducing poorly balanced or gimmicky maps that appeared in some later updates.\n- Economy and unlocks: progression, unlockable items, and in-game economy in that year struck a balance players liked between cosmetic rewards and meaningful progression without excessive grind.\n- Community and meta: by 2019 the competitive meta and community knowledge had matured around consistent mechanics, producing a strong competitive scene and shared strategies."},{"profile_name":"GoonyaFighter","game_name":"Goonya Fighter","archive_name":"Goonya Fighter APM3 Edition (1.04.00)(2021-07-07)(JPN)[Sega ALLS][TP]","genre":"Fighting","tp_loader":"TeknoParrot","arcade_system":"SEGA ALLS","linked_profile":"","is_secondary":false,"setup_exe":"game\\Goonya Fighter.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":4,"supp_archives":"Goonya Fighter APM3 Edition (1.00.00)(2020-08-27)(JPN)[Sega ALLS][TP]; Goonya Fighter APM3 Edition (1.01.00)(2020-10-16)(JPN)[Sega ALLS][TP]; Goonya Fighter APM3 Edition (1.02.00)(2020-11-13)(JPN)[Sega ALLS][TP]; Goonya Fighter APM3 Edition (1.03.00)(2021-04-07)(JPN)[Sega ALLS][TP]","status":"Working","tags":"","last_updated":"2026-06-23","notes":""},{"profile_name":"PowerInstinctV","game_name":"Gouketsuji Ichizoku: Senzo Kuyou (Taito Type X2)","archive_name":"Gouketsuji Ichizoku - Matsuri Senzo Kuyou (1.0.0)(2009-06-23)[Taito Type X2][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Taito Type X2","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- This is the Taito Type X2 version"},{"profile_name":"G re just going to run into problems running the game.  See the \"RAW THRILLS path length limits\" section in this document for all the details.\n\n~64-character limit (old engine, strictest):\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"GHA\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\n- requires TPUI to be run as Admin\n- game won't work in fullscreen, game's window goes off into the netherland\n- run game in windowed mode, then use Borderless Gaming to force it into fullscreen\n\norder of guitar buttons are:\nGREEN  RED  YELLOW  BLUE  ORANGE\n\n  A     S      D      F      G\n\nif playing with a keyboard, assign keyboard keys in the order they are written, such as A, S, D, F, G keys.\n\nFor those of you uninitiated on how to play basic GH:\n- for each note that passes over the FRET line (the line of 5 colored buttons on the lower part of the screen), you need to press the corresponding color key AND use the up or down STRUM key AT THE SAME TIME.\n\nIf a note has a solid line after it, hold the key until the line ends, and let go of the key.  you do not have to hold the strum key down, just press it to activate at the beginning of the move.\n\nTO RECAP.. \n- to hit a note, press both the colored FRET key, AND either up/down STRUM key AT THE SAME TIME.\n- figure it out from there, or watch someone play the game on a real GH console guitar to get a better idea.\n\nIf you're having any sort of issue with game resolutions, the game writes some configurations to the following location:\n%USERPROFILE%\\AppData\\Local\\Aspyr\\Guitar Hero III\\AspyrConfig.XML\nif moving the game to another machine, you might want to remember to copy this file over too as it may contain save data."},{"profile_name":"GBOS","game_name":"Gundam Battle Operating Simulator","archive_name":"Gundam Battle Operating Simulator (1.002)(2005- oke >96.\n\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"H2OVER\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\nGame works fine with Xinput.\n\nHow to setup a network to play against other computers:\n\nAll you need to do is make sure all the IP addresses for the games are in the same network subnet, and aren't being used by another device on your network.  Since there is no subnet mask entry available as an option in this particular game, I am assuming that TPUI internally has the subnet mask setup as 255.255.255.0\n\nSo, for example, to setup 8 computers to play the game, and if your local router is setup to use addresses within this IP range, set them up as follows in the game settings on each machine.  192.168.0.x is a common home router address range, as is 192.168.1.x.  Just adjust as necessary.\n\nCabinet 1: 192.168.0.130\nCabinet 2: 192.168.0.131\nCabinet 3: 192.168.0.132\nCabinet 4: 192.168.0.133\nCabinet 5: 192.168.0.134\nCabinet 6: 192.168.0.135\nCabinet 7: 192.168.0.136\nCabinet 8: 192.168.0.137\n\nOn each of the physical computers representing each cabinet, you would need to setup the Ethernet network interface card (NIC) and give them each a static IP address the same as the ones assigned above.\n\nComputer 1 (representing Cabinet 1), change the NIC settings to:\nIP address:  192.168.0.130\nsubnet mask: 255.255.255.0\ndefault Gateway:  192.168.0.1\n\n.. repeat on the other computers.\n\nUse a search engine or an AI bot to ask how to change your Ethernet settings on your computer(s), or for further clarification if you're still confused."},{"profile_name":"Halo","game_name":"HALO Fireteam Raven","archive_name":"Halo Fireteam Raven (3.11)(2018)[Raw Thrills][TP]","genre":"Shooter","tp_loader":"ElfLdr2","arcade_system":"RAW Thrills Linux PC Based","linked_profile":"","is_secondary":false,"setup_exe" ition (1.0)(2009-10-05)[Sega Lindbergh Yellow][TP]","genre":"Racing","tp_loader":"ElfLdr2","arcade_system":"SEGA Lindbergh Yellow","linked_profile":"","is_secondary":false,"setup_exe":"hummer_Master.elf","setup_exe2":"","test_exe":"","nvidia_status":"WITH_FIX","nvidia_issues":"","amd_status":"WITH_FIX","amd_issues":"","intel_status":"WITH_FIX","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- has the flicker and shader fix (by Nezarn) applied\n- language options in the service menu are English and Chinese\n- native resolution 1280x768\n\nI have changed the FRAME_COUNT to 30 as this is required for the game to play properly.  If the opponents are super-fast and lapping you, read below.\n\nWhy are the opponents way faster than me? \n- you edited the \\data-hummer\\config\\kernel.nut file and set the FRAME_COUNT higher than 30. \n- change the FRAME_COUNT to 30. if it is set higher, the AI will not behave properly.\n\nWhy does this game contain 124,817 files in 16,259 folders?\n\nSymbolic links (symlinks) in Linux are special types of files that point to another file or directory, functioning like a shortcut. They allow you to reference a file's path without duplicating its contents. \n\nIn the game's original Linux-based OS, the following two folder locations listed below contain many subfolders with identical contents in each of them.  Linux uses symlinks to create copies of these files and point to an original file location, thus saving space.\n\nHowever, symlinks cannot exist on Windows NTFS drives (at least not linux's ext-based flavor of symlinks). In order for all these symlinked files to exist on a Windows platform, any symbolic links had to be replaced with the real files. This is why the game is about 150MB larger than the original Linux version.\n\n\\drv\\nvidia\\180.29\\lib\\X11\\xserver\\\n\\drv\\nvidia\\base\\lib\\X11\\xserver\\\n\n\nLAN Networking (2-4 Players)\nSetup\n\n- Set IP addresses of each LAN machine in GAME SETTINGS for Hummer in TeknoParrotUI. You must set both the IP of the machine itself, and then the IP of each intended connected machine.\n- Do this for each machine intended to be connected.\n- Enter test menu on each machine and set the Cab ID according to how you setup the IPs in TeknoParrotUI\n- Also in test menu, set the total number of cabs intended to be connected\n- Game should enter a network check screen after PLEASE WAIT... screen, once all machines make it to this screen they should find eachother and connect successfully.\n\nAlways allow Window Firewall to pass through communication of this game. This should auto pop-up upon first execution (Alt+Tab to view or exit game)."},{"profile_name":"HydroThunder","game_name":"Hydro Thunder","archive_name":"Hydro Thunder (1.01b)(1999)(USA)[Midway PC][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"MIDWAY PC Based","linked_profile":"","is_secondary":false,"setup_exe":"HYDRO_x64.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- original HYDRO.EXE requires the use of \"ThunderPatcher\" to create 2 new executables (x86 and x64 versions. use the exe that corresponds to your host OS)\n- in the saga of patching, we're up to like v1.7 of the thunderpatcher\n- of the 3 different types of glide2x dll's offered in the patcher, D3D11 is your best bet as it has the same features as D3D12 but is faster in terms of raw FPS and lower stuttering. D3D12 suffers from shader cache stutter and poor optimization with multi-core CPU's. D3D9 is slower, outdated and missing things the game needs.\n- eventually this game will become stable.  just have to be patient and let the TP Devs work through it.  It's not an easy game to tame!"},{"profile_name":"Hype md_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"On first run, the game will prompt you to find the \"TeknoParrot.dll\" from your TP install folder. It will be inside the \"TeknoParrot\" subfolder. The dll changes from time to time with TPUI updates, so the dll will not be wrapped into the game distro.\n\nWhen you select the TeknoParrot.dll file's location, a \"TPFIX.ini\" file will be created in the \\Binaries\\Win32 folder, and the absolute path to that dll is written inside the ini file.  If you move your teknoparrot install folder somewhere else, be sure to either update this ini file, or delete it and re-choose the dll's new location the next time you run the game.\n\nmatrix32.dll fix is already included.\ndinput.dll fix is already included.\nP1.png and P2.png crosshairs are already in \\Binaries\\Win32 folder.\n\n----------------\nIn \\SwordGame\\Config\\SwordEngine.ini, search for:\n\n[SystemSettings]\nbUseMaxQualityMode=True\n\nscroll down a bit and you can modify the resolution here (default is 1920x1080):\n\nResX=1920\nResY=1080\n\nYou can also set the localization language (KOR, JPN, ITA, INT, FRA, ESN, DEU, CHN):\n[Engine.Engine]\nLanguage=INT\n\n---------------\n\nIn \\SwordGame\\Config\\SwordArcade.ini\n\nCreditsToStart=1 (or 0 to FreePlay)\n\nIf set to FreePlay, also change\nCreditsToContinue=0\n\n\nI can't get the crosshairs to show up at all, no matter what game setting I choose.  Other players have the same problem, seems there is no solution nor did the devs ever bother to look into it.\n\nWhen you press the ESC key to exit the game, the game does not exit cleanly and will show a \"Failed to run the process\" error in the command window. Either press the ESC key again to close the command prompt window, or click on \"Force Quit Game\"."},{"profile_name":"ID4Exp","game_name":"Initial D: Arcade Stage 4 (Export)","archive_na ssues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"~96-character limit (mid-era engine):\nThese titles used the Phoenix or early Unicorn loader. They’ll choke above 96, but 80–90 is still safest. These usually run on Linux builds with slightly safer path logic (longer structs), but still choke >96.\n\nThis game is a problem child. You’ll want to keep this game folder as short as possible. \nRename the game folder to \"JURASS\" (or something else equally as short and sweet).\nPut the game folder in the shortest game path possible, such as \"D:\\TPGames\"\n\nAnother game that doesn't work for me with RawInput. XInput works, but who wants to play a game like this with a game controller."},{"profile_name":"JusticeLeague","game_name":"Justice League - Heroes United","archive_name":"Justice League - Heroes United (1.1.0-258)(2009)[Global VR PC][TP]","genre":"Action","tp_loader":"OpenParrot","arcade_system":"Global VR PC Based","linked_profile":"","is_secondary":false,"setup_exe":"JLA.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- TP will only run the game windowed, this is TP's fault and not the game.  Can't edit the ini to force it either, it won't work.  I didn't try the Borderless Gaming app yet.\n- do not delete JLH_default_settings.ini\n- you can safely delete EECrash.dmp, Heroes.log\n\n- read the READ-ME!!!.txt left by the crack author for additional game notes regarding required codecs and such.\n\n*** You don't need TP to run this game, just run JLA.exe  ***\n\n- edit the JLH.ini file to run the game in fullscreen and a different resolution:\n\nFullscreen=true\nScreenResolutionX=1920\nScreenResolutionY=1080\nDisplayWidth=1920\nDisplayHeight=1080\n\nthere are also some built-in cheats:\n\nLeft Shoulder button = complete level immediately\nRight Shoulder button = defeat all enemies currently on screen\n\nKeyboard Left Arrow key = Service menu\n - use the up and down arrow keys to move in the menu, then use the left and right arrow keys to move in and out of the sub-menu(s)\n - when on an option you want to modify, press the right arrow to make the box turn RED, which means you can now make changes\n - use the right arrow key on the \"PLAY GAME\" button to exit\n\nKeyboard Right Arrow key = listen to your heroes say \"FOR JUSTICE!\".  This is probably the best thing about this game.. this game sucks ass otherwise."},{"profile_name":"KOn2","game_name":"K-On! After School Rhythm Selection","archive_name":"K-On! After School Rhythm Selection (2.0)(2014-12-25)(JPN)[Taito Type X][TP]","genre":"Rhythm","tp_loader":"TeknoParrot","arcade_system":"Taito Type X","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"NO_INFO","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- native resolution 640x480\n- game operating fine"},{"profile_name":"KODrive","game_name":"K.O. Drive (Prototype)","archive_name":"K.O. Drive (Prototype)(2013)(China)[Sega RingWide][TP]","genre":"Racing","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"exe\\M-DriveR_RingWide.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- exe is M-DriveR_RingWide.exe\n- game must have the DongleRegion and PcbRegion set to JAPAN\n- test Muscle Grand Prix 2","archive_name":"Kinnikuman Muscle Grand Prix 2 (2007)[Namco System 256][TP]","genre":"Sports","tp_loader":"pcsx2x6","arcade_system":"Namco System 256","linked_profile":"","is_secondary":false,"setup_exe":"NM00040.acgame","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- Namco System 256"},{"profile_name":"KingofFightersMaximumImpactRegulationA","game_name":"KOF Maximum Impact Regulation A","archive_name":"King of Fighters Maximum Impact Regulation A (2007)[Taito Type X2][TP]","genre":"Fighting","tp_loader":"OpenParrot","arcade_system":"Taito Type X2","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"Game will start to a black screen and background title movie audio playing.  Press the coin button and you'll get the static title screen picture and the game will carry on.  This workaround is from adding d3d8.dll, d3d9.dll, dddraw.dll, and wined3d.dll to the game folder beside game.exe from WineD3DForWindows_10.16 (or any recent build, doesn't really matter).  Just make sure they are the x86 dll's and not x64.. the game did come out in 2007 after all.\n\nThere is a problem with TPUI not handling the .sfd video files properly.  There are some short in-game video files that will not play either and you'll be presented with a black screen with the audio playing.  Just wait them out and carry on playing the game.  You can play any of these .sfd videos in VLC or MPC-HC if you want to watch them.\n\nThe game's movie files (*.sfd) will not play back the video portion of the files, only the audio. There are 5 movie files in data\\__gmdata\\movie\\:\n\nbargein.sfd\t\t(5s, \"new challenger, clown\")\nbargein2.sfd\t(5s, \"new challenger\")\ngover.sfd\t\t(6s, \"game over\")\nkof_op.sfd\t\t(1m19s, \"attract video\")\nstaff.sfd\t\t(2m11s, \"end credits\")\n\nAll except for kof_op.sfd are in-game videos. kof_op.sfd is the attract title video.  All can be played in any common video player (VLC, MPC-HC, etc). They are mpeg1 video and adpcm_adx audio.\n\nIt is not the fault of the video files, but the fault of the game and an old codec that is either missing, or not being handled properly by the emulator.  This is an old problem and has never been fixed by the TP Devs."},{"profile_name":"KingofFightersSkyStage","game_name":"KOF Sky Stage","archive_name":"KOF Sky Stage (1.00J)(2010)[Taito Type X][TP]","genre":"Shoot 'Em Up","tp_loader":"OpenParrot","arcade_system":"Taito Type X","linked_profile":"","is_secondary":false,"setup_exe":"game.exe","setup_exe2":"","test_exe":"","nvidia_status":"NO_INFO","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- screen rotated with reshader\n-CRT overlay addon was disabled, I kept the bezel though"},{"profile_name":"Koihime","game_name":"Koihime Enbu","archive_name":"Koihime Enbu (2014)[Sega RingEdge 2][TP]","genre":"Fighting","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge 2","linked_profile":"","is_secondary":false,"setup_exe":"koi_systemAPM.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"game works"},{"profile_name":"KoihimeEnbuAPM3","game_name":"Koihime † Performance Ryorai Ryorai Version 3 APM3 Edition","a on't display them).\n\nGo to the following path in your game folder:  \n\\Data\\scripts\\game_conf.lua\n\nlook for:\n    -- Device Usage Information\n    { \"IOBoardComPort\", 0 },\n\nEnsure the IOBoardComPort is set to 0.  If it is any other value than 0, change it to zero. There you go, now the game starts in 30 seconds!\n\n---\n\nSET THE GAME TO FREE PLAY VIA THE TEST MENU\n- If you just want a pile of credits, you'll have to play in free play mode. You'll get 50,000 credits.\n- enable FREE PLAY in the Test Menu > Game Settings > Free Play\n- ensure you \"Write Backup Ram\" before exiting the test menu to save the change.\n\nGAME BUTTONS:\n\nTest: does nothing\n\nReset Switch:\n- in test menu, it is the select button,\n- in game, it is the \"Start/Reel\" button.\n\nUp:\n- in game, it will increase your bet by +25. \n\nDown: \n- does nothing. \n\nUnknown 1: \n- in game, if you hold it down for a few seconds, it pulls up the on-screen operators menu. You can add coins and clear them from there. It also gets you into the actual test mode.\n\nUnknown 2: \n- in test menu, moves the selection arrow up\n- in game, \n\n---\n\nHOW TO USE THE STARTUP TEST MENU:\n\nYou need 2 key bindings setup for the test menu:\n- \"UNKNOWN 2\" = move arrow in test menu \n- \"RESET SWITCH\" = select\n\n(DO THIS FIRST PART ONLY ONCE WHEN YOU FIRST START PLAYING)\n- Start the game in TEST MODE (TPUI button).  Don't worry, entering test mode is quick.\n- Select \"Clear backup data\".  \n- Select \"Clear All Data\". This resets the current game and everything else to zero. \n- Select \"Yes\" to confirm your changes.\n- Select \"Exit\" to exit the game back to TPUI.\n\nNow, any time you want to change the game, just do this:\n- Start TEST MODE\n- Select Setup > Select Game Setting > Select Game\n- make your game choice, then exit back to main test menu\n- Select \"Write Backup Ram\", confirm with Yes\n- Select \"Exit\" to exit the game back to TPUI.\n- Start game normally and enjoy the game. If you want to play another game, repeat the above process.\n\nHOW TO USE THE IN-GAME TEST MENU:\n\n- press and hold down the \"Unknown 1\" key for a few seconds and the menu should appear. In the upper left-hand side of the screen, you'll see 3 semi-transparent boxes pop up.  They're kinda hard to see at first glance.\n\nIf this does not work for you, press and hold the \"Door switch\" button, and while holding that button down, press and hold the \"Unknown 1\" key until the operator menu comes up. This is typically how an operator would access the test menu in a real physical game - unlocking and opening the cash door first, then pressing the test button inside.\n\n- continuing to hold down the key, use the mouse to select one of the boxes\n- you can enter test mode here and make changes. you may have to save and exit/restart the game to enable the features you changed.  if you do nothing and select exit, it will put you back in the game.\n- the other two boxes are for adding medals (which convert to the usable credits you bet with), or performing an attendant payout, which is used on a real machine by a player to cash out some of their winnings.\n\nThere are 5 different slot-themed games to choose from in the test menu:\nHot Shot Progressive\nThe House of the Dead LL\nLucky da Fugo (Millionaire) LL\nSamba de Amigo LL\n10 Hand Poker LL\n\nKEY BINDINGS: \n\nMy preferred key bindings:\nTest: T\nReset: R\nUp: arrow up\nDown: arrow down\nUnknown 1: I\nUnknown 2: O\nBelly switch: 9\nMain Door switch: 0\n\n\nHARDCODED KEY BINDINGS:\nD = Double Up\nH = Half Double Up\nP = Payout"},{"profile_name":"Left4Dead","game_name":"Left 4 Dead -Survivors-","archive_name":"Left 4 Dead - Survivors (1.2403)(2016-03-04)(JPN)[Taito Type X3][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"Taito Type X3","linked_profile":"","is_secondary":false,"setup_exe":"left4dead2.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"OK","intel_issues":"","general_issues":"Works via Teknoparrot Online only for now, do not start it without TPO.","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"AKA \"L4DAC\"\n\nGame exe MUST NOT BE RENAMED (leave it as left4dead2.exe and load that into TP). The game folders and paths are all reliant on the naming of the exe. This is the same behavior as a Unity game.\n\nMULTIPLAYER:\n\nYou will need to have a TP subscription, then join/create a Left 4 Dead lobby in order to play a multiplayer game.\n\n---\n\nSINGLEPLAYER GAME:\n\nTo play the game in singleplayer mode, you will have to run the game standalone. The TP devs are only supporting multiplayer mode at this time. \n\nCreate a batch file and add the following command string (Japanese language as an example):\nleft4dead2.exe -console -arcadeIO_InitializeSkip -game left4dead2 -language japanese -noborder -windowed\n\nWhat the options do:\n-console: opens the console window on startup, for convenience. Remove this if you don't want to use the console or see it on startup. Use F12 to open the console - only available on certain screens.\n-arcadeIO_InitializeSkip:  bypasses the I/O and NESiCA checks. not using this will result in a \"call attendant\" error on NESiCA.\n-language: selects the game language\n-noborder: no windows border\n-windowed: combined with -noborder, game runs in a borderless fullscreen window\n\n\nThere are a couple dozen more game languages available:\nbrazilian\nbulgarian\nczech\ndanish\ndutch\nenglish\nfinnish\nfrench\ngerman\ngreek\nhungarian\nitalian\nkorean\nkoreana\nnorwegian\npolish\nportuguese\nromanian\nrussian\nschinese\nspanish\nswedish\ntchinese\nthai\nturkish\n\nIf you want to see all the options you have available with the exe, there is a metric shit-ton more!\nhttps://developer.valvesoftware.com/wiki/Command_line_options?uselang=en\n\n---\n\nDefault Controls:\n\nW, A, S, & D: Movement\nShift: Walk\nSpace: Jump\nCTRL: Crouch\nLeft mouse button: Shoot\nRight mouse button: Shove\nMouse wheel: Switch item\nR: Reload\nE: Action\nF: Flashlight\nY: Text Chat\nT: Voice chat\nU: Team text chat\n\nother keys:\nF7: Enter\nF9: Test Menu\nF12: open Console\n\nNote: The controls used to play Left 4 Dead 2 are a combination of keyboard keys, the mouse and mouse buttons. all keys can be re-assigned using the Controls tab found in the Options tab on the main menu of the game. From there you can change the key bindings.\n\n---\n\nTo Quit the Game:\n\nThe default F12 key is already set up to open the console, but if your game is not bound to that key, you'll have to change it.\n\nPress F12 to bring up the console menu\ntype \"quit\" and press enter.  \nGame quits.\n\n---\n\nHOW TO AVOID LOCKED GAME FONTS:\n\nA stock L4DS game will lock two fonts into the System's FontCache when the game runs. After you exit the game, the System does not release them. If you try to move or delete the game folder afterwards, you'd be denied due to these system-locked font files. The fonts in question are located in \\platform\\vgui\\fonts\nFOT-ModeMinBStd-B.otf\nFOT-ReggaeStd-B.otf\n\nTO AVOID THIS HAPPENING:\n- on both of the font files above, double-click to open the font window, and click INSTALL. this adds both of the fonts to your system fonts folder.\n- if your game has already locked the fonts, reboot your PC right now to unlock them\n- rename the two font files slightly, something like \"_FOT-ModeMinBStd-B.otf\".  When the game is loaded and goes looking for those fonts, it won't find them. However, it will default to your Windows\\System\\Fonts folder and voila.. it finds them there because you installed them.  Since they're now system fonts, the game uses them and NO MORE LOCKED FONT FILES.\n- cool eh?  If you ever come across any other game that behaves like this, you can perform the same procedure. I've only come across this when dealing with a few Japanese games.\n\nDon't trust installing these fonts? These are both available professional fonts and are legit.\nhttps://eng.fontke.com/font/10390543/\nhttps://eng.fontke.com/font/10390205/\nYou already have a bajillion pre-installed fonts in your System font folder, what's a couple more.\n\n---\n\nIf you get a new translation file for the ARCADE user interface (UI) and you want to use it, it will be called \"l4dArcadeui_english.txt\"\n- place it in the \\left4dead2\\resource\\ folder\n- if there is an existing file, rename that file first and keep it as a backup, or if you don't care, overwrite it"},{"profile_name":"LGI3D","game_name":"Let's Go Island 3D: Lost on the Island of Tropics","archive_name":"Let's Go Island 3D - Lost on the Island of Tropics (2011)[Sega RingEdge][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"SEGA RingEdge","linked_profile":"","is_secondary":false,"setup_exe":"LGI.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"If playing a solo game, the QTE events require the P1 and P2 start button, so be sure to assign them to the P1 gun."},{"profile_name":"LGI","game_name":"Let's Go Island: Lost on the Island of Tropics","archive_name":"Let's Go Island - Lost on the Island of Tropics (2010)[Sega RingWide][TP]","genre":"Shooter","tp_loader":"TeknoParrot","arcade_system":"SEGA RingWide","linked_profile":"","is_secondary":false,"setup_exe":"LGI_RingW_F_safe.exe","setup_exe2":"","test_exe":"","nvidia_status":"OK","nvidia_issues":"","amd_status":"OK","amd_issues":"","intel_status":"NO_INFO","intel_issues":"","general_issues":"","supp_count":0,"supp_archives":"","status":"Working","tags":"","last_updated":"2026-06-23","notes":"- start game before the intro gets to the end, at times game will crash after intro ends\n- game does NOT work on INTEL"},{"profile_nam
